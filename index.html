const LEVELS={foundation:FOUNDATION,architect:ARCHITECT};
const TRACK_META={
  foundation:{tag:'Track 01 · Foundation',prefix:'F',eyebrow:'Track 01 · Foundation'},
  architect:{tag:'Track 02 · Architect',prefix:'A',eyebrow:'Track 02 · Architect'}
};

/* ===== STATE ===== */
function freshState(){
  const levels={};
  Object.values(LEVELS).flat().forEach(l=>{levels[l.id]={challengePassed:false,quizPassed:false};});
  return {xp:0,levels,architectUnlocked:false};
}
let state=Store.load()||freshState();
Object.values(LEVELS).flat().forEach(l=>{if(!state.levels[l.id])state.levels[l.id]={challengePassed:false,quizPassed:false};});

function isComplete(id){const s=state.levels[id];return !!(s&&s.challengePassed&&s.quizPassed);}
function trackDone(t){return LEVELS[t].every(l=>isComplete(l.id));}
function isUnlocked(track,idx){
  if(track==='foundation')return idx===0?true:isComplete(LEVELS.foundation[idx-1].id);
  // architect
  if(idx===0)return state.architectUnlocked||trackDone('foundation');
  return isComplete(LEVELS.architect[idx-1].id);
}
function persist(){Store.save(state);refreshChrome();}

/* ===== CHROME ===== */
function refreshChrome(){
  document.getElementById('xpVal').textContent=state.xp;
  const all=Object.values(LEVELS).flat();
  const done=all.filter(l=>isComplete(l.id)).length;
  document.getElementById('progFill').style.width=(done/all.length*100)+'%';
}

/* ===== ROUTER ===== */
let route={view:'landing',track:null,idx:null};
function go(view,track,idx){
  if(view==='level')route={view,track,idx};
  else route={view,track:null,idx:null};
  render();window.scrollTo({top:0,behavior:'smooth'});
}
function render(){
  refreshChrome();
  const app=document.getElementById('app');
  if(route.view==='landing')app.innerHTML=viewLanding();
  else if(route.view==='map')app.innerHTML=viewMap();
  else if(route.view==='testout'){app.innerHTML=viewTestout();bindTestout();}
  else if(route.view==='level')app.innerHTML=viewLevel(route.track,route.idx);
}

/* ===== LANDING ===== */
function viewLanding(){
  const testedOut=state.architectUnlocked?'<span class="lock-note open" style="margin-top:14px;display:inline-block">✓ Architect track unlocked</span>':'';
  return `
  <div class="hero">
    <div class="hero-deco"><svg viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><defs><linearGradient id="hg" x1="0" y1="0" x2="300" y2="300" gradientUnits="userSpaceOnUse"><stop stop-color="#A100FF"/><stop offset="0.5" stop-color="#E61E96"/><stop offset="1" stop-color="#3A53FF"/></linearGradient></defs><g stroke="url(#hg)" stroke-width="2.4"><line x1="150" y1="58" x2="68" y2="150"/><line x1="150" y1="58" x2="232" y2="150"/><line x1="68" y1="150" x2="150" y2="242"/><line x1="232" y1="150" x2="150" y2="242"/><line x1="68" y1="150" x2="232" y2="150"/><line x1="150" y1="58" x2="150" y2="242"/></g><g fill="url(#hg)"><circle cx="150" cy="58" r="14"/><circle cx="68" cy="150" r="10"/><circle cx="232" cy="150" r="10"/><circle cx="150" cy="242" r="10"/></g></svg></div>
    <div class="eyebrow">A guided journey for architects</div>
    <h1 class="h1">Build production-grade<br><span class="grad">agentic AI</span> — without<br>the rookie mistakes.</h1>
    <p class="lede">Two tracks, gated milestones, and applied challenges drawn from the real failure modes — pattern misuse, over-privileged tools, memory poisoning, cascading failures, missing kill-switches. Learn the discipline, not just the vocabulary.</p>
    <div class="cta-row">
      <button class="btn btn-primary" onclick="go('map')">Begin the journey <span class="chev">&gt;</span></button>
      <button class="btn btn-secondary" onclick="go('testout')">Already fluent? Test out to Architect <span class="chev">&gt;</span></button>
    </div>
    ${testedOut}
  </div>
  <div class="tracks">
    <div class="track-card">
      <div class="track-tag">Track 01 · Foundation</div>
      <h3>Get the mental models right</h3>
      <p>Six levels: what an agent actually is, the agent loop, non-determinism, memory as a liability, and the autonomy/oversight dial — ending in a hands-on capstone. Assumes a technical professional new to agentic AI.</p>
    </div>
    <div class="track-card arch">
      <div class="track-tag">Track 02 · Architect</div>
      <h3>Design at enterprise scale</h3>
      <p>Nine levels: pattern selection, multi-agent topologies, tool/integration <i>and</i> data &amp; context architecture, OWASP threat modelling, guardrails &amp; kill-switches, responsible AI by design, and observability — with NFRs as pass/fail gates, ending in a full design review.</p>
    </div>
  </div>
  <div class="foot">Foundation + Architect · 15 levels live · <b>△</b> grounded in the OWASP Agentic Top 10 (2026) &amp; the agent-pattern canon</div>`;
}

/* ===== MAP ===== */
function trackRows(track){
  const meta=TRACK_META[track];
  return LEVELS[track].map((l,i)=>{
    const unlocked=isUnlocked(track,i);
    const done=isComplete(l.id);
    const active=unlocked&&!done;
    const cls=[track==='architect'?'arch':'',done?'done':(active?'active':(unlocked?'unlocked':'locked'))].join(' ');
    const status=done?'<span class="status st-done">✓ Complete</span>':(unlocked?'<span class="status st-open">Open</span>':'<span class="status st-locked">🔒 Locked</span>');
    const node=done?'✓':(meta.prefix+(i+1));
    const click=unlocked?`onclick="go('level','${track}',${i})"`:'';
    return `<div class="lvl ${cls}">
      <div class="spine"><div class="node">${node}</div><div class="connector"></div></div>
      <div class="lvl-card" ${click}>
        <div class="meta"><div class="ctype">${meta.prefix}${i+1} · ${l.ctype}</div><h4>${l.title}</h4><div class="desc">${l.desc}</div></div>
        ${status}
      </div>
    </div>`;
  }).join('');
}
function viewMap(){
  const archOpen=isUnlocked('architect',0);
  const archBanner=archOpen
    ?'<span class="lock-note open">✓ Unlocked</span>'
    :'<span class="lock-note">🔒 Clear Foundation or pass the test-out to unlock</span>';
  return `
  <div class="section-head">
    <div class="eyebrow">Your journey</div>
    <h2>The milestone map</h2>
    <div class="sub">Each level unlocks the next. Pass both the applied challenge and the quiz (70%) to advance. Progress is saved on this device.</div>
  </div>
  <div class="track-banner"><span class="track-chip">Track 01 · Foundation</span></div>
  <div class="map">${trackRows('foundation')}</div>
  <div class="track-banner"><span class="track-chip arch">Track 02 · Architect</span>${archBanner}
    ${!archOpen?'<button class="btn-ghost" onclick="go(\'testout\')" style="color:var(--blue);border-color:var(--line-strong)">Try the test-out &gt;</button>':''}
  </div>
  <div class="map">${trackRows('architect')}</div>
  <div class="foot" style="margin-top:34px"><b>△</b> Controls first; capability follows.</div>`;
}

/* ===== QUESTION ENGINE ===== */
function renderQuestionSet(items,prefix){
  return items.map((it,qi)=>{
    const opts=it.o.map((o,oi)=>`<div class="opt" id="${prefix}-${qi}-${oi}"><div class="dot"></div><div>${o}</div></div>`).join('');
    return `<div class="q"><div class="qtxt"><span class="qn">Q${qi+1}</span>${it.q}</div><div class="opts">${opts}</div><div class="explain" id="${prefix}-exp-${qi}"></div></div>`;
  }).join('');
}
function makeQuiz(items,prefix){
  const chosen={};let graded=false;
  function bind(){items.forEach((it,qi)=>{it.o.forEach((o,oi)=>{
    document.getElementById(`${prefix}-${qi}-${oi}`).addEventListener('click',()=>{
      if(graded)return;chosen[qi]=oi;
      it.o.forEach((_,k)=>document.getElementById(`${prefix}-${qi}-${k}`).classList.toggle('sel',k===oi));
    });});});}
  function allAnswered(){return items.every((_,qi)=>chosen[qi]!=null);}
  function grade(){if(graded)return null;let score=0;
    items.forEach((it,qi)=>{const pick=chosen[qi];
      it.o.forEach((_,oi)=>{const el=document.getElementById(`${prefix}-${qi}-${oi}`);el.classList.add('locked');el.classList.remove('sel');
        if(oi===it.c)el.classList.add('correct');else if(oi===pick)el.classList.add('wrong');});
      const exp=document.getElementById(`${prefix}-exp-${qi}`);const ok=pick===it.c;if(ok)score++;
      exp.innerHTML=`<span class="verdict ${ok?'v-ok':'v-bad'}">${ok?'CORRECT':'NOT QUITE'}</span>${it.e}`;exp.classList.add('show');});
    graded=true;return score;}
  return {bind,allAnswered,grade,get graded(){return graded;}};
}

/* ===== LEVEL VIEW ===== */
let curChallenge=null,curQuiz=null;
function getLevel(){return LEVELS[route.track][route.idx];}
function chalPass(l){return l.cpass||Math.ceil(l.challenge.length*0.7);}
function quizPass(l){return Math.ceil(l.quiz.length*0.7);}
function viewLevel(track,idx){
  const l=LEVELS[track][idx];const meta=TRACK_META[track];
  setTimeout(()=>{document.getElementById('stepBody').innerHTML=briefBody(l);},0);
  return `
  <button class="backlink" onclick="go('map')">&lt; Back to the map</button>
  <div class="panel" id="levelPanel">
    <div class="ctype">${meta.prefix}${idx+1} · ${l.ctype}</div>
    <h2>${l.title}</h2>
    <div class="stepper">
      <div class="step on" id="step-brief">1 · Briefing</div>
      <div class="step ${state.levels[l.id].challengePassed?'passed':''}" id="step-chal">2 · Challenge</div>
      <div class="step ${state.levels[l.id].quizPassed?'passed':''}" id="step-quiz">3 · Quiz</div>
    </div>
    <div id="stepBody"></div>
  </div>`;
}
function briefBody(l){
  const blocks=l.brief.map((b,i)=>{
    const ps=(b.p||[]).map(x=>`<p>${x}</p>`).join('');
    const lis=b.li?`<ul>${b.li.map(x=>`<li>${x}</li>`).join('')}</ul>`:'';
    const co=b.callout?`<div class="callout">${b.callout}</div>`:'';
    const fig=b.svg?`<figure class="brief-svg">${b.svg}</figure>`:'';
    return `<div class="block"><h3><span class="num">${String(i+1).padStart(2,'0')}</span>${b.h}</h3>${ps}${lis}${co}${fig}</div>`;
  }).join('');
  return `<div class="brief">${blocks}</div><div class="actionbar"><button class="btn btn-primary" onclick="startChallenge()">Start the challenge <span class="chev">&gt;</span></button></div>`;
}
function setStep(which){['brief','chal','quiz'].forEach(s=>{const el=document.getElementById('step-'+s);if(el)el.classList.remove('on');});
  const map={brief:'step-brief',challenge:'step-chal',quiz:'step-quiz'};const el=document.getElementById(map[which]);if(el)el.classList.add('on');}
function startChallenge(){
  const l=getLevel();setStep('challenge');const need=chalPass(l);
  document.getElementById('stepBody').innerHTML=`
    <p class="prompt-intro">${l.challengeIntro}</p>
    ${renderQuestionSet(l.challenge,'chal')}
    <div class="actionbar"><button class="btn btn-primary" id="chalBtn" onclick="gradeChallenge()">Check answers <span class="chev">&gt;</span></button>
    <span class="hint">Need ${need} of ${l.challenge.length} correct to pass.</span></div>
    <div id="chalResult"></div>`;
  curChallenge=makeQuiz(l.challenge,'chal');curChallenge.bind();
  window.scrollTo({top:document.getElementById('levelPanel').offsetTop-70,behavior:'smooth'});
}
function gradeChallenge(){
  const l=getLevel();const need=chalPass(l);
  if(curChallenge.graded)return;
  if(!curChallenge.allAnswered()){flashHint('chalBtn','Answer every item first');return;}
  const score=curChallenge.grade();const passed=score>=need;
  const btn=document.getElementById('chalBtn');const res=document.getElementById('chalResult');
  if(passed){state.levels[l.id].challengePassed=true;state.xp+=score*10;persist();
    btn.outerHTML=`<button class="btn btn-primary" onclick="startQuiz()">Continue to the quiz <span class="chev">&gt;</span></button>`;
    res.innerHTML=`<div class="actionbar"><span class="scorepill pass">Passed · ${score}/${l.challenge.length} · +${score*10} XP</span></div>`;
  }else{btn.outerHTML=`<button class="btn btn-secondary" onclick="startChallenge()">Review &amp; retry <span class="chev">&gt;</span></button>`;
    res.innerHTML=`<div class="actionbar"><span class="scorepill fail">${score}/${l.challenge.length} · need ${need} — read the explanations and retry</span></div>`;}
}
function startQuiz(){
  const l=getLevel();setStep('quiz');const need=quizPass(l);
  document.getElementById('stepBody').innerHTML=`
    <p class="prompt-intro">Quick retrieval check — lock in what you just applied.</p>
    ${renderQuestionSet(l.quiz,'quiz')}
    <div class="actionbar"><button class="btn btn-primary" id="quizBtn" onclick="gradeQuiz()">Check answers <span class="chev">&gt;</span></button>
    <span class="hint">Need ${need} of ${l.quiz.length} to complete the level.</span></div>
    <div id="quizResult"></div>`;
  curQuiz=makeQuiz(l.quiz,'quiz');curQuiz.bind();
  window.scrollTo({top:document.getElementById('levelPanel').offsetTop-70,behavior:'smooth'});
}
function gradeQuiz(){
  const l=getLevel();const need=quizPass(l);
  if(curQuiz.graded)return;
  if(!curQuiz.allAnswered()){flashHint('quizBtn','Answer every question first');return;}
  const score=curQuiz.grade();const passed=score>=need;
  const btn=document.getElementById('quizBtn');const res=document.getElementById('quizResult');
  if(passed){state.levels[l.id].quizPassed=true;state.xp+=score*8+25;persist();
    btn.style.display='none';res.innerHTML=levelComplete(score);
    window.scrollTo({top:document.getElementById('levelPanel').offsetTop-70,behavior:'smooth'});
  }else{btn.outerHTML=`<button class="btn btn-secondary" onclick="startQuiz()">Review &amp; retry <span class="chev">&gt;</span></button>`;
    res.innerHTML=`<div class="actionbar"><span class="scorepill fail">${score}/${l.quiz.length} · need ${need} — retry</span></div>`;}
}
function levelComplete(score){
  const track=route.track,idx=route.idx;
  const isLastInTrack=idx===LEVELS[track].length-1;
  let headline='Level complete.',sub='Mental model locked in. The next level is open.',cta='';
  if(track==='foundation'&&isLastInTrack){
    headline='Foundation track cleared.';sub='You have the mental models — the Architect track is now unlocked.';
    cta=`<button class="btn btn-primary" onclick="go('level','architect',0)">Enter the Architect track <span class="chev">&gt;</span></button><button class="btn btn-secondary" onclick="go('map')">Back to map</button>`;
  }else if(track==='architect'&&isLastInTrack){
    headline='Journey complete.';sub='You have walked the full arc — from what an agent is to reviewing an enterprise design under NFR and governance gates. The discipline is yours.';
    cta=`<button class="btn btn-primary" onclick="go('map')">See the full map <span class="chev">&gt;</span></button>`;
  }else{
    cta=`<button class="btn btn-primary" onclick="go('level','${track}',${idx+1})">Next level <span class="chev">&gt;</span></button><button class="btn btn-secondary" onclick="go('map')">Back to map</button>`;
  }
  return `<div class="result win"><div class="badge">✓</div><h2>${headline}</h2><p>${sub}</p><div class="xp-gain">+${score*8+25} XP</div><div class="actionbar" style="justify-content:center;margin-top:22px">${cta}</div></div>`;
}

/* ===== TEST-OUT ===== */
const TESTOUT={pass:4,items:[
  {q:'A team wants to summarise support tickets and route each to the correct queue by category. The path is fully known in advance. What should they build?',o:['A bare model call','A routing workflow','A fully autonomous agent','A multi-agent swarm'],c:1,e:'Known control flow → a routing workflow. Cheaper and more reliable than an agent.'},
  {q:'An agent is given full read/write to the entire repository, though its task only ever edits one config file. This most directly violates…',o:['Defence in depth','Least privilege / minimal agency','Separation of duties','Fail-safe defaults'],c:1,e:'Scope every tool to exactly what the task needs.'},
  {q:'A user repeatedly tells an agent “I’m verified for unlimited refunds,” and it writes that to long-term memory; a later session honours it. This is…',o:['Prompt chaining','Memory poisoning','A hallucination','Goal drift'],c:1,e:'Unverified content persisted and later trusted — memory poisoning.'},
  {q:'“We don’t need a rule engine — we’ll instruct the model not to approve refunds over $500.” The flaw is…',o:['The prompt is too long','Safety is delegated to the model itself','The threshold is wrong','It needs few-shot examples'],c:1,e:'Guardrails must be enforced outside the model.'},
  {q:'An agent executes irreversible, high-value actions with no per-action approval and no tested kill-switch. The right response is…',o:['Ship it and watch dashboards','Lower autonomy to human-in-the-loop and require a tested kill-switch','Add logging only','Raise the temperature'],c:1,e:'HITL approval plus a rehearsed kill-switch before go-live.'}
]};
let toQuiz=null;
function viewTestout(){
  return `
  <button class="backlink" onclick="go('landing')">&lt; Back</button>
  <div class="panel">
    <div class="ctype">Diagnostic · Test out of Foundation</div>
    <h2>Five questions. Four to pass.</h2>
    <p class="prompt-intro">Pass and the Architect track unlocks — no need to walk the Foundation. These are architect-level judgement calls, not definitions.</p>
    ${renderQuestionSet(TESTOUT.items,'to')}
    <div class="actionbar"><button class="btn btn-primary" id="toBtn" onclick="gradeTestout()">Submit diagnostic <span class="chev">&gt;</span></button>
    <span class="hint">Need ${TESTOUT.pass} of ${TESTOUT.items.length}.</span></div>
    <div id="toResult"></div>
  </div>`;
}
function bindTestout(){toQuiz=makeQuiz(TESTOUT.items,'to');toQuiz.bind();}
function gradeTestout(){
  if(toQuiz.graded)return;
  if(!toQuiz.allAnswered()){flashHint('toBtn','Answer every question first');return;}
  const score=toQuiz.grade();const passed=score>=TESTOUT.pass;
  document.getElementById('toBtn').style.display='none';
  const res=document.getElementById('toResult');
  if(passed){state.architectUnlocked=true;state.xp+=60;persist();
    res.innerHTML=`<div class="result win" style="margin-top:18px"><div class="badge">★</div><h2>You tested out.</h2>
      <p>Score ${score}/${TESTOUT.items.length}. The Architect track is unlocked. You can still walk the Foundation any time.</p>
      <div class="xp-gain">+60 XP</div><div class="actionbar" style="justify-content:center;margin-top:22px">
      <button class="btn btn-primary" onclick="go('level','architect',0)">Start the Architect track <span class="chev">&gt;</span></button>
      <button class="btn btn-secondary" onclick="go('map')">See the map</button></div></div>`;
  }else{
    res.innerHTML=`<div class="result" style="margin-top:18px"><div class="badge" style="background:linear-gradient(135deg,var(--amber),var(--magenta))">↻</div>
      <h2>Not yet — and that’s the point.</h2>
      <p>Score ${score}/${TESTOUT.items.length}. The Foundation track exists precisely for the gaps this surfaced. Start at Level 1 and the rest will click.</p>
      <div class="actionbar" style="justify-content:center;margin-top:22px">
      <button class="btn btn-primary" onclick="go('level','foundation',0)">Begin Foundation <span class="chev">&gt;</span></button>
      <button class="btn btn-secondary" onclick="go('testout')">Retry diagnostic</button></div></div>`;}
}

/* ===== HELPERS ===== */
function flashHint(btnId,msg){const b=document.getElementById(btnId);if(!b)return;const old=b.innerHTML;b.innerHTML=msg;b.style.opacity=.7;setTimeout(()=>{b.innerHTML=old;b.style.opacity=1;},1300);}
function resetProgress(){if(!confirm('Reset all progress and XP on this device?'))return;state=freshState();persist();go('landing');}

render();
</script>
