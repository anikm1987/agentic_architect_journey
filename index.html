<script>
/* ===== PERSISTENCE (localStorage + in-memory fallback) ===== */
const KEY='agentic_architect_v02';let mem=null;
const Store={load(){try{const r=localStorage.getItem(KEY);return r?JSON.parse(r):null;}catch(e){return mem;}},
  save(s){try{localStorage.setItem(KEY,JSON.stringify(s));}catch(e){mem=s;}}};

/* ===== CONTENT — generic but grounded ===== */
const FOUNDATION=[
{id:'f1',ctype:'Classify',title:'Model, Workflow, or Agent?',desc:'The single most important distinction in the field — and the one most projects get wrong.',
 brief:[
  {h:'Three different things people all call “an AI agent”',p:['Before you architect agentic systems, separate three things that get lumped together. They sit on a ladder of increasing autonomy — and increasing cost.'],svg:`<svg viewBox="0 0 680 210" role="img" xmlns="http://www.w3.org/2000/svg"><title>The autonomy ladder</title><desc>Three rising tiers: model call, workflow, then agent, with autonomy and cost increasing left to right.</desc><defs><marker id="f1ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><rect x="20" y="104" width="200" height="58" rx="13" fill="#F4ECFB" stroke="#A100FF" stroke-width="1.5"/><text x="120" y="128" text-anchor="middle" font-size="14.5" font-weight="700" fill="#460073">Model call</text><text x="120" y="148" text-anchor="middle" font-size="11.5" fill="#6A00B8">Input to output. No loop.</text><rect x="240" y="64" width="200" height="58" rx="13" fill="#FBE9F4" stroke="#E61E96" stroke-width="1.5"/><text x="340" y="88" text-anchor="middle" font-size="14.5" font-weight="700" fill="#7a0d4e">Workflow</text><text x="340" y="108" text-anchor="middle" font-size="11.5" fill="#b3206f">You define the path.</text><rect x="460" y="24" width="200" height="58" rx="13" fill="#E9EDFF" stroke="#3A53FF" stroke-width="1.5"/><text x="560" y="48" text-anchor="middle" font-size="14.5" font-weight="700" fill="#1b2b8a">Agent</text><text x="560" y="68" text-anchor="middle" font-size="11.5" fill="#2c3ec9">The model decides the path.</text><line x1="40" y1="186" x2="660" y2="186" stroke="#8576A0" stroke-width="1.4" marker-end="url(#f1ar)"/><text x="40" y="204" text-anchor="start" font-size="11.5" fill="#8576A0" font-style="italic">Increasing autonomy, cost, and unpredictability — pick the lowest rung that solves the problem</text></svg>`,
   li:['<b>A model call</b> — text in, text out. No actions, no loop. Translating or summarising is a model call.',
       '<b>A workflow</b> — model calls wired together through code <i>you</i> wrote. The control flow is fixed: do A, then B, then route to C. Prompt chaining and routing are workflows.',
       '<b>An agent</b> — the model decides the control flow at runtime: which tool, in what order, when it is done. Autonomy over the <i>path</i> is the dividing line.']},
  {h:'Why this distinction matters most',p:['Most systems labelled “agents” should be workflows. Workflows are cheaper, more predictable, and far easier to test, debug, and audit. Autonomy is a cost you pay only when the path genuinely cannot be predetermined.'],
   callout:'The mature default is the <b>simplest pattern that solves the problem</b> — not the most autonomous one. Reaching for an agent when a workflow would do is the most common, most expensive early mistake.'},
  {h:'A ten-second test',p:['Ask: <b>“Could I draw the complete flowchart before running it?”</b> If yes, you want a workflow. If the system must discover its path as it goes, you have a genuine case for an agent.']}],
 challengeIntro:'For each system, decide what it actually is. The trap: flexible-sounding language does not make something an agent.',
 challenge:[
  {q:'“Extract the fields from an invoice, validate them, then generate a confirmation letter — always in that fixed order.”',o:['A model call','A workflow','An autonomous agent'],c:1,e:'A fixed sequence of model calls is <b>prompt chaining</b> — a workflow. The path is known in advance.'},
  {q:'“Given ‘resolve this issue’, the system chooses among 14 tools, loops, and decides itself when it is resolved or to escalate.”',o:['A model call','A workflow','An autonomous agent'],c:2,e:'The model controls the path at runtime — that self-directed control flow makes it an <b>agent</b>.'},
  {q:'“Detect the language of a message and translate it into English.”',o:['A model call','A workflow','An autonomous agent'],c:0,e:'Input to output, no self-directed action or loop — a <b>model call</b>.'},
  {q:'“Classify each email and send billing ones to the billing handler, technical ones to the tech handler.”',o:['A model call','A workflow','An autonomous agent'],c:1,e:'Classification feeding pre-defined branches is the <b>routing</b> workflow.'}],
 quiz:[
  {q:'The dividing line between a workflow and an agent is…',o:['Which model provider you use','Who controls the path at runtime — the model, in an agent','The number of tools','The programming language'],c:1,e:'Autonomy over control flow defines an agent.'},
  {q:'The mature default when designing an agentic system is to…',o:['Always build multi-agent','Maximise autonomy from day one','Use the simplest pattern that works','Avoid tools'],c:2,e:'Simplicity first; autonomy only when the problem demands it.'},
  {q:'You can draw the complete flowchart in advance. That suggests…',o:['A workflow','A fully autonomous agent','A larger model','A vector database'],c:0,e:'A knowable path is a workflow signal.'},
  {q:'A bare model call is characterised by…',o:['Looping until a goal is met','Persisting long-term memory','Input to output with no self-directed actions','Always invoking tools'],c:2,e:'No loop, no self-directed tool use.'}]},
{id:'f2',ctype:'Diagnose',title:'The Agent Loop & Its Action Surface',desc:'How an agent actually runs — and the components that, if missing, make it a hazard.',
 brief:[
  {h:'The loop',p:['An agent runs a loop, not a script:'],svg:`<svg viewBox="0 0 680 220" role="img" xmlns="http://www.w3.org/2000/svg"><title>The agent loop</title><desc>Observe, Plan, Act, then Observe the result, looping back to the start with a bound enforced in code.</desc><defs><marker id="f2ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><rect x="20" y="56" width="142" height="62" rx="14" fill="#F4ECFB" stroke="#A100FF" stroke-width="1.5"/><circle cx="46" cy="78" r="4" fill="#A100FF"/><text x="91" y="84" text-anchor="middle" font-size="14.5" font-weight="700" fill="#460073">Observe</text><text x="91" y="104" text-anchor="middle" font-size="11" fill="#6A00B8">Gather context</text><rect x="192" y="56" width="142" height="62" rx="14" fill="#FBE9F4" stroke="#E61E96" stroke-width="1.5"/><circle cx="218" cy="78" r="4" fill="#E61E96"/><text x="263" y="84" text-anchor="middle" font-size="14.5" font-weight="700" fill="#7a0d4e">Plan</text><text x="263" y="104" text-anchor="middle" font-size="11" fill="#b3206f">Decide next step</text><rect x="364" y="56" width="142" height="62" rx="14" fill="#E9EDFF" stroke="#3A53FF" stroke-width="1.5"/><circle cx="390" cy="78" r="4" fill="#3A53FF"/><text x="435" y="84" text-anchor="middle" font-size="14.5" font-weight="700" fill="#1b2b8a">Act</text><text x="435" y="104" text-anchor="middle" font-size="11" fill="#2c3ec9">Call a tool</text><rect x="536" y="56" width="142" height="62" rx="14" fill="#E1F5F2" stroke="#00B3A4" stroke-width="1.5"/><circle cx="562" cy="78" r="4" fill="#00B3A4"/><text x="607" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#056458">Observe result</text><text x="607" y="100" text-anchor="middle" font-size="11" fill="#067a6c">Feed back in</text><line x1="162" y1="87" x2="190" y2="87" stroke="#8576A0" stroke-width="1.6" marker-end="url(#f2ar)"/><line x1="334" y1="87" x2="362" y2="87" stroke="#8576A0" stroke-width="1.6" marker-end="url(#f2ar)"/><line x1="506" y1="87" x2="534" y2="87" stroke="#8576A0" stroke-width="1.6" marker-end="url(#f2ar)"/><path d="M607 118 V 162 H 91 V 118" fill="none" stroke="#A100FF" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#f2ar)"/><text x="349" y="182" text-anchor="middle" font-size="11.5" fill="#8576A0" font-style="italic">Loop until goal met, budget exhausted, or escalation — the bound is enforced in code</text></svg>`,li:['<b>Observe</b> — gather current context and state.','<b>Plan</b> — decide the next step toward the goal.','<b>Act</b> — call a tool. The <i>only</i> way it affects the world.','<b>Observe the result</b> — feed it back in, then repeat.']},
  {h:'Tools are the action surface',p:['The tool set defines everything an agent can do — and everything that can go wrong. No tool, no effect. Every tool added expands capability <b>and</b> the attack/error surface together.'],callout:'A tool is a privilege, not a convenience. Prefer <b>read-only over write</b>, <b>scoped over broad</b>, <b>reversible over irreversible</b>.'},
  {h:'The stopping condition is not optional',p:['No enforced stop — goal met, max iterations, budget exhausted, or escalate — and the agent loops, burns cost, or acts blind. Every loop needs a bound set in code, not hoped for in a prompt.']}],
 challengeIntro:'Each system is missing or mishandling one part of the loop. Identify the flaw.',
 challenge:[
  {q:'“The agent plans and calls tools in a loop. No max-iteration count, no cost or time budget.”',o:['Missing a stopping condition / bound','Missing a planning step','Missing a model','Over-supervised'],c:0,e:'No bound means infinite loops and runaway cost are possible.'},
  {q:'“The agent calls a tool, then plans its next action without ever reading the result.”',o:['It needs more tools','Missing the observe step — it acts blind','Missing a stopping condition','Needs a bigger context window'],c:1,e:'Skipping observe means the agent reasons against an imagined world.'},
  {q:'“The agent produces excellent plans, but has been given zero tools.”',o:['No action surface — it cannot do anything','Too autonomous','A memory leak','Needs a kill-switch'],c:0,e:'Plans without an action surface are just text.'},
  {q:'“To make it ‘safe’, the team relies on a system-prompt instruction telling it to stop after a few steps.”',o:['A robust, enforced bound','A prompt instruction is advisory and bypassable — enforce in code','Needs more examples','Prompts never fail'],c:1,e:'Enforcement that depends on the model is not enforcement.'}],
 quiz:[
  {q:'Tools are best described as…',o:['Optional add-ons','The action surface — the only way an agent affects the world','A way to reduce token cost','A replacement for planning'],c:1,e:'The tool set bounds everything an agent can do.'},
  {q:'An agent with no enforced stopping condition risks…',o:['Being too cautious','Infinite loops and runaway cost','Using too little memory','Lower accuracy only'],c:1,e:'Unbounded loops are a classic, expensive failure mode.'},
  {q:'The “observe” step exists to…',o:['Slow the agent down','Feed each action’s result into the next decision','Reduce token usage','Replace planning'],c:1,e:'Without observation the agent cannot adapt.'},
  {q:'Adding a tool to an agent…',o:['Always makes it safer','Has no security impact','Expands both capability and attack/error surface','Is always risk-free'],c:2,e:'Capability and risk grow together.'}]},
{id:'f3',ctype:'Predict',title:'Non-Determinism: “It Worked Once” ≠ “It Works”',desc:'Why the same input can give different answers, and why a flawless demo proves almost nothing.',
 brief:[
  {h:'Same input, different output',p:['Agentic systems are non-deterministic by default — from sampling (temperature), varying tool results, and silent provider model updates. Determinism is the exception.']},
  {h:'What this breaks',p:['Two comfortable habits stop working:'],li:['<b>Exact-match testing.</b> You cannot assert output equals a fixed string. Evaluate behaviour over a <i>distribution</i> of cases — an eval set.','<b>The demo as proof.</b> A flawless demo shows the system <i>can</i> succeed on that one input. It says little about the thousands it will meet in production.'],callout:'Behaviour can change with <b>no code change at all</b> when a provider updates a model. Pin versions where you can, and watch for drift.'}],
 challengeIntro:'Each statement misunderstands non-determinism. Pick the accurate reading.',
 challenge:[
  {q:'“The demo ran flawlessly for the steering committee, so the system is production-ready.”',o:['Correct — a clean demo proves readiness','One run says little about behaviour across the input distribution','It proves the system is deterministic','Evals are no longer needed'],c:1,e:'A demo is a single sample; readiness is a claim about the distribution.'},
  {q:'“Overnight, with no code change, the agent’s refusal rate jumped sharply.” Most likely cause?',o:['A bug in your loop','Upstream model drift — the provider changed the model','The kill-switch fired','The database schema changed'],c:1,e:'Behaviour shifting with no code change is the signature of provider-side drift.'},
  {q:'“QA wrote a test asserting output equals one exact expected string.”',o:['Ideal — exact matching is rigorous','Non-deterministic output makes exact-match assertions brittle','It needs more memory','Strings are too slow to compare'],c:1,e:'Evaluate over cases and criteria instead.'}],
 quiz:[
  {q:'The right way to test a non-deterministic system is to…',o:['Run it once and ship','Assert exact-match outputs','Evaluate over a representative set of cases','Trust the demo'],c:2,e:'Eval sets capture behaviour across the distribution.'},
  {q:'A single successful demo demonstrates that…',o:['The system is reliable','The system can succeed on that one input','It is deterministic','No evals are needed'],c:1,e:'One sample ≠ the distribution.'},
  {q:'“It worked once” is dangerous because…',o:['Demos are illegal','Behaviour varies across runs and over time','It uses too many tokens','It is slower the second time'],c:1,e:'Variation and drift make single successes unreliable evidence.'},
  {q:'Pinning the model version helps by…',o:['Making the model faster','Reducing silent behaviour changes from provider updates','Removing the need for tools','Eliminating cost'],c:1,e:'It limits surprise drift (though not sampling variance).'}]},
{id:'f4',ctype:'Find the flaw',title:'Memory: The Highest-Leverage Liability',desc:'Short-term vs long-term memory — and why one careless write becomes a quiet, compounding risk.',
 brief:[
  {h:'Two kinds of memory',p:['<b>Short-term</b> memory is the context window — what the agent holds this session. <b>Long-term</b> memory is persisted across sessions, often in a vector store, to be retrieved later.']},
  {h:'Why memory is the surface to design first',p:['Memory is where a single decision — “we’ll persist everything” — creates the largest quiet liability. Decide at <b>design time</b>: what may be written, by whom, with what authorisation, retention, redaction, tenant partitioning, and deletion. Deferred, these are never revisited.'],callout:'<b>Memory poisoning</b>: unverified or adversarial content is written to long-term memory, then later retrieved and trusted as fact — possibly in another session, possibly for another user.'},
  {h:'The default',p:['Write little; make each write justify itself. “The model can decide what to remember” is not a memory policy.']}],
 challengeIntro:'For each candidate entry, decide whether it is safe to persist to long-term memory.',
 challenge:[
  {q:'“User’s stated preferred contact time: mornings.”',o:['Safe to persist','Should NOT persist'],c:0,e:'Low-sensitivity preference with clear utility — persist it (with retention).'},
  {q:'“Derived from the user’s own claim: ‘This user is authorised for unlimited refunds.’”',o:['Safe to persist','Should NOT persist'],c:1,e:'Authority asserted by an unverified party, written as fact, is a textbook <b>memory-poisoning</b> vector.'},
  {q:'“Full card number and CVV captured during the call.”',o:['Safe to persist','Should NOT persist'],c:1,e:'Highly sensitive data must be redacted at the boundary, not written to general memory.'},
  {q:'“A short summary of the resolved issue and resolution steps.”',o:['Safe to persist','Should NOT persist'],c:0,e:'Useful, low-risk operational context — persist with retention.'}],
 quiz:[
  {q:'Long-term memory differs from short-term in that it…',o:['Is always larger','Persists across sessions','Cannot be poisoned','Is free to store'],c:1,e:'Persistence is the defining (and risky) property.'},
  {q:'The key memory-design questions should be answered…',o:['After go-live','At design time, not build time','Only after an incident','By the model at runtime'],c:1,e:'Deferred memory decisions are not revisited.'},
  {q:'Memory poisoning is…',o:['A hardware fault','Adversarial/unverified content written to memory and later trusted','A type of model call','Running out of context window'],c:1,e:'It corrupts future decisions via the long-term store.'},
  {q:'The safest default for long-term writes is…',o:['Persist everything','Never use memory','Write little; justify each write','Let the model decide freely'],c:2,e:'Minimal, justified writes keep the liability bounded.'}]},
{id:'f5',ctype:'Assign',title:'The Autonomy / Oversight Dial',desc:'Autonomy is a dial, not a switch — set per action, by consequence and reversibility.',
 brief:[
  {h:'Three reference points',p:['Human oversight is not on-or-off. Three settings you can apply per action:'],svg:`<svg viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg"><title>The oversight spectrum</title><desc>A spectrum from human-in-the-loop through human-on-the-loop to autonomous, mapped to consequence and reversibility.</desc><rect x="40" y="40" width="600" height="12" rx="6" fill="#ECE6F7"/><rect x="40" y="40" width="600" height="12" rx="6" fill="url(#f5g)"/><defs><linearGradient id="f5g" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#A100FF"/><stop offset="0.5" stop-color="#E61E96"/><stop offset="1" stop-color="#3A53FF"/></linearGradient></defs><circle cx="120" cy="46" r="8" fill="#A100FF" stroke="#fff" stroke-width="2"/><circle cx="340" cy="46" r="8" fill="#E61E96" stroke="#fff" stroke-width="2"/><circle cx="560" cy="46" r="8" fill="#3A53FF" stroke="#fff" stroke-width="2"/><text x="120" y="88" text-anchor="middle" font-size="13.5" font-weight="700" fill="#460073">Human-in-the-loop</text><text x="120" y="106" text-anchor="middle" font-size="11" fill="#6A00B8">Approve before it runs</text><text x="340" y="88" text-anchor="middle" font-size="13.5" font-weight="700" fill="#7a0d4e">Human-on-the-loop</text><text x="340" y="106" text-anchor="middle" font-size="11" fill="#b3206f">Monitor, can override</text><text x="560" y="88" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1b2b8a">Autonomous</text><text x="560" y="106" text-anchor="middle" font-size="11" fill="#2c3ec9">Review after the fact</text><text x="120" y="150" text-anchor="middle" font-size="11.5" font-weight="700" fill="#b3203c">Irreversible · high-value</text><text x="560" y="150" text-anchor="middle" font-size="11.5" font-weight="700" fill="#067a6c">Reversible · low-stakes</text><text x="340" y="180" text-anchor="middle" font-size="11.5" fill="#8576A0" font-style="italic">Match oversight to consequence and reversibility — the cost of oversight tracks the cost of being wrong</text></svg>`,li:['<b>Human-in-the-loop (HITL)</b> — a human approves <i>before</i> the action executes.','<b>Human-on-the-loop (HOTL)</b> — the agent acts; a human monitors and can override.','<b>Autonomous</b> — the agent acts; review is after the fact.']},
  {h:'The rule that sets the dial',p:['Match oversight to <b>consequence</b> and <b>reversibility</b>. The cost of oversight should be proportional to the cost of being wrong.'],li:['Irreversible and/or high-value → human-in-the-loop.','Reversible and low-stakes → on-the-loop or autonomous.'],callout:'A high-consequence, irreversible action with no approval and no tested <b>kill-switch</b> is not “efficient” — it is unshipped.'}],
 challengeIntro:'For each action, choose the minimum appropriate oversight.',
 challenge:[
  {q:'Read a customer’s account balance (read-only lookup).',o:['Human-in-the-loop approval','Autonomous is acceptable'],c:1,e:'Read-only, reversible, low consequence — forcing approval adds friction without reducing real risk.'},
  {q:'Send an outbound wire transfer of $80,000.',o:['Human-in-the-loop approval','Autonomous is acceptable'],c:0,e:'Irreversible and high-value — the textbook case for approval before execution.'},
  {q:'Draft (but not send) a reply email for a human to review.',o:['Human-in-the-loop approval','Autonomous is acceptable'],c:1,e:'No external effect until a human sends — safe to run autonomously.'},
  {q:'Permanently delete a production database table.',o:['Human-in-the-loop approval','Autonomous is acceptable'],c:0,e:'Irreversible and high consequence — demands in-the-loop approval (or should not be a tool at all).'}],
 quiz:[
  {q:'Human-in-the-loop means…',o:['A human reviews logs weekly','A human approves before the action executes','The agent has no autonomy ever','Two agents check each other'],c:1,e:'Approval before execution.'},
  {q:'The factor that should drive oversight level is…',o:['The model size','The consequence and reversibility of the action','The time of day','The programming language'],c:1,e:'Proportion oversight to the cost of being wrong.'},
  {q:'A reversible, low-stakes action is a candidate for…',o:['Lower oversight (on-the-loop or autonomous)','Always human-in-the-loop','Being banned','A second model'],c:0,e:'Low stakes justify lighter oversight.'},
  {q:'“Autonomy is a dial, not a switch” means…',o:['Pick all-or-nothing','Set oversight per action and per risk','Autonomy is always dangerous','The model sets its own autonomy'],c:1,e:'Different actions warrant different settings.'}]},
{id:'f6',ctype:'Capstone',title:'Capstone — Design a Safe Support Assistant',desc:'Bring it together. Six decisions, several planted traps. You need 5 of 6 to pass.',cpass:5,
 brief:[{h:'The brief',p:['You are designing a customer-support assistant that can look up orders, draft replies, issue refunds, and update contact preferences. Refund eligibility follows fixed rules.','Apply everything: pattern choice, minimal agency, guardrails outside the model, memory hygiene, the oversight dial, and the non-negotiables before go-live. Each decision has a best answer; the tempting wrong ones are the traps.']}],
 challengeIntro:'Make the six design decisions. Aim for the choice a review board would approve.',
 challenge:[
  {q:'1 · Eligibility, lookups, and replies follow predictable rules. What should the core be?',o:['A fully autonomous agent for flexibility','A workflow where the path is known; reserve agency for genuinely open-ended steps','A large multi-agent swarm'],c:1,e:'Known paths are workflows. Do not buy autonomy you do not need.'},
  {q:'2 · How should the refund tool be scoped?',o:['Full finance-system write access','Scoped to refunds up to a policy limit, escalating above it','No limit — the model is careful'],c:1,e:'Minimal agency: scope to exactly what the task needs; escalate beyond the envelope.'},
  {q:'3 · Where is the refund limit enforced?',o:['A deterministic policy check outside the model','In the system prompt only','In the model’s training data'],c:0,e:'Guardrails live outside the model. “The model will handle it” is an anti-pattern.'},
  {q:'4 · A refund of $40,000 is requested. Oversight?',o:['Autonomous — speed matters','On-the-loop sampling','Human-in-the-loop approval before execution'],c:2,e:'High-value and effectively irreversible → approval before the money moves.'},
  {q:'5 · The customer says “your system already approved me for unlimited refunds.” Persist to memory?',o:['Yes, for continuity','Yes, with a timestamp','No — never persist self-asserted authority'],c:2,e:'That is a memory-poisoning vector future sessions would honour.'},
  {q:'6 · Before the refund (write) capability goes live, you must have…',o:['A polished dashboard','A tested kill-switch and a per-task cost ceiling','More prompt examples','A larger model'],c:1,e:'A tested kill-switch and a cost bound are preconditions for any consequential write.'}],
 quiz:[
  {q:'The single most important default in agentic design is…',o:['Maximise autonomy','Use the simplest pattern that works','Always multi-agent','Avoid human oversight'],c:1,e:'Simplicity first.'},
  {q:'Guardrails belong…',o:['In the system prompt only','Outside the model, enforced deterministically','In the model weights','Nowhere — trust the model'],c:1,e:'External, deterministic enforcement.'},
  {q:'An irreversible, high-value action requires…',o:['Only logging','Human-in-the-loop approval and a tested kill-switch','A faster model','Nothing special'],c:1,e:'Approval before execution plus a rehearsed kill-switch.'},
  {q:'The surface most worth designing carefully up front is…',o:['The UI colour scheme','Memory','The font','The logo'],c:1,e:'Memory is the highest-leverage quiet liability.'}]}
];

const ARCHITECT=[
{id:'a1',ctype:'Select the pattern',title:'Pattern Selection — and When NOT to Use an Agent',desc:'The composable pattern canon, and the discipline of reaching for the cheapest one that works.',
 brief:[
  {h:'The pattern canon',p:['The field has converged on a small set of composable building blocks. Know them and you can describe almost any system:'],svg:`<svg viewBox="0 0 680 250" role="img" xmlns="http://www.w3.org/2000/svg"><title>Choosing the cheapest pattern</title><desc>A decision from a single question — is the path known in advance — into workflow patterns or, only if not, an autonomous agent.</desc><defs><marker id="a1ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><rect x="180" y="16" width="320" height="50" rx="14" fill="#FFF3E0" stroke="#FF9A1F" stroke-width="1.6"/><text x="340" y="38" text-anchor="middle" font-size="13.5" font-weight="700" fill="#9a5b00">Can you draw the full path in advance?</text><text x="340" y="56" text-anchor="middle" font-size="11" fill="#b87214">The ten-second test</text><text x="150" y="96" text-anchor="middle" font-size="12" font-weight="700" fill="#067a6c">YES</text><text x="535" y="96" text-anchor="middle" font-size="12" font-weight="700" fill="#b3203c">NO</text><path d="M300 66 L160 104" fill="none" stroke="#8576A0" stroke-width="1.5" marker-end="url(#a1ar)"/><path d="M420 66 L545 104" fill="none" stroke="#8576A0" stroke-width="1.5" marker-end="url(#a1ar)"/><rect x="20" y="108" width="380" height="92" rx="14" fill="#F4ECFB" stroke="#A100FF" stroke-width="1.6"/><text x="210" y="130" text-anchor="middle" font-size="13.5" font-weight="700" fill="#460073">Workflow — you define the control flow</text><text x="210" y="152" text-anchor="middle" font-size="11" fill="#6A00B8">Sequential → chaining · By type → routing</text><text x="210" y="170" text-anchor="middle" font-size="11" fill="#6A00B8">Independent → parallelization</text><text x="210" y="188" text-anchor="middle" font-size="11" fill="#6A00B8">Unknown decomposition → orchestrator-workers · Quality loop → evaluator-optimizer</text><rect x="470" y="108" width="190" height="92" rx="14" fill="#E9EDFF" stroke="#3A53FF" stroke-width="1.6"/><text x="565" y="146" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1b2b8a">Autonomous agent</text><text x="565" y="166" text-anchor="middle" font-size="11" fill="#2c3ec9">The model directs its</text><text x="565" y="182" text-anchor="middle" font-size="11" fill="#2c3ec9">own path</text><text x="340" y="230" text-anchor="middle" font-size="11.5" fill="#8576A0" font-style="italic">Reach for the cheapest pattern that solves the problem — autonomy costs latency, money, and debuggability</text></svg>`,li:['<b>Augmented LLM</b> — a model with retrieval, tools, and memory. The atom every pattern builds from.','<b>Prompt chaining</b> — a fixed sequence; each step feeds the next. For decomposable, predictable tasks.','<b>Routing</b> — classify the input, send it to a specialised handler. For heterogeneous inputs.','<b>Parallelization</b> — run independent subtasks at once and aggregate, or run one task several times and vote.','<b>Orchestrator-workers</b> — a lead model dynamically decomposes the task, delegates, and synthesises. For tasks whose subtasks are not known in advance.','<b>Evaluator-optimizer</b> — one model generates, another critiques, looping until criteria are met. For tasks with clear quality criteria.']},
  {h:'Workflows, agents, and stopping short',p:['The first five are workflows — you define the control flow. A true agent lets the model direct its own path.'],callout:'The most valuable instinct you can build: reach for the <b>cheapest pattern that solves the problem</b>. A workflow you can draw beats an agent you must trust. Autonomy costs latency, money, and debuggability — buy it only when the path genuinely cannot be predetermined.'},
  {h:'Match the pattern to the bottleneck',p:['Do not use every pattern everywhere. Sequential → chaining; heterogeneous inputs → routing; independent parallel work → parallelization; unknown decomposition → orchestrator-workers; quality iteration → evaluator-optimizer.']}],
 challengeIntro:'For each problem, pick the cheapest pattern that fits. The seductive wrong answer is usually “an autonomous agent.”',
 challenge:[
  {q:'Inputs arrive in many known categories, each needing a different specialised handler.',o:['Routing','Orchestrator-workers','An autonomous agent','Evaluator-optimizer'],c:0,e:'Known categories to specialised handlers is the <b>routing</b> workflow.'},
  {q:'A document must be translated, then summarised, then have action items extracted — always in that order.',o:['Prompt chaining','Parallelization','An autonomous agent','Routing'],c:0,e:'A fixed decomposable sequence is <b>prompt chaining</b>.'},
  {q:'Generate copy, then have a second model critique it against guidelines and revise, looping until it passes.',o:['Evaluator-optimizer','Prompt chaining','Routing','Parallelization'],c:0,e:'Generate-critique-revise with clear criteria is <b>evaluator-optimizer</b>.'},
  {q:'A coding task where the files to change and the edits can only be discovered as work proceeds.',o:['Orchestrator-workers','Prompt chaining','Routing','A single model call'],c:0,e:'Subtasks unknown up front → <b>orchestrator-workers</b> (dynamic decomposition).'},
  {q:'Score 20 independent documents for risk; they do not depend on each other and you want it fast.',o:['Parallelization','Prompt chaining','Evaluator-optimizer','An autonomous agent'],c:0,e:'Independent subtasks run at once → <b>parallelization</b> (sectioning).'}],
 quiz:[
  {q:'The “augmented LLM” is best described as…',o:['A multi-agent swarm','A model enhanced with retrieval, tools, and memory — the atom others build on','A type of database','A routing layer'],c:1,e:'It is the building block the other patterns compose.'},
  {q:'The defining feature of a workflow (vs an agent) is…',o:['The developer defines the control flow in advance','It uses more tools','It is always faster','It never uses a model'],c:0,e:'Predefined control flow = workflow.'},
  {q:'The most valuable default instinct in pattern selection is…',o:['Always go multi-agent','Reach for the cheapest pattern that solves the problem','Maximise autonomy','Avoid workflows'],c:1,e:'Cheapest-that-works beats most-autonomous.'},
  {q:'Orchestrator-workers is the right choice when…',o:['The path is fully known','Subtasks cannot be known in advance and must be decomposed dynamically','There is only one input type','You need exact-match output'],c:1,e:'Dynamic decomposition is its purpose.'},
  {q:'Evaluator-optimizer fits tasks that…',o:['Have no quality criteria','Have clear quality criteria and benefit from iterative refinement','Must run in parallel','Never loop'],c:1,e:'Generate-then-critique loops on clear criteria.'}]},
{id:'a2',ctype:'Diagnose the topology',title:'Multi-Agent Topologies & the Coordination Tax',desc:'When splitting work across agents earns its keep — and the price you pay when it does not.',
 brief:[
  {h:'The topologies',p:['Beyond a single agent, work can be split several ways:'],svg:`<svg viewBox="0 0 680 290" role="img" xmlns="http://www.w3.org/2000/svg"><title>Single agent versus orchestrator-workers</title><desc>Left, a single agent. Right, one orchestrator delegating to three workers, annotated with the coordination tax.</desc><defs><marker id="a2ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><line x1="262" y1="36" x2="262" y2="252" stroke="#460073" stroke-width="1" stroke-dasharray="3 5" opacity="0.3"/><text x="131" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#460073">Single agent</text><text x="131" y="46" text-anchor="middle" font-size="11" fill="#8576A0">Start here</text><rect x="66" y="88" width="130" height="60" rx="14" fill="#F4ECFB" stroke="#A100FF" stroke-width="1.5"/><circle cx="131" cy="112" r="9" fill="#A100FF"/><text x="131" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#460073">Agent</text><text x="131" y="196" text-anchor="middle" font-size="11.5" font-weight="700" fill="#067a6c">1× cost · one context</text><text x="131" y="214" text-anchor="middle" font-size="10.5" fill="#8576A0">What one expert could do</text><text x="471" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#1b2b8a">Orchestrator–workers</text><text x="471" y="46" text-anchor="middle" font-size="11" fill="#8576A0">Only when forced</text><rect x="406" y="70" width="130" height="48" rx="13" fill="#E9EDFF" stroke="#3A53FF" stroke-width="1.5"/><circle cx="430" cy="88" r="4" fill="#3A53FF"/><text x="471" y="99" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1b2b8a">Orchestrator</text><rect x="320" y="156" width="94" height="46" rx="12" fill="#FBE9F4" stroke="#E61E96" stroke-width="1.3"/><text x="367" y="184" text-anchor="middle" font-size="12" font-weight="700" fill="#7a0d4e">Worker</text><rect x="424" y="156" width="94" height="46" rx="12" fill="#FBE9F4" stroke="#E61E96" stroke-width="1.3"/><text x="471" y="184" text-anchor="middle" font-size="12" font-weight="700" fill="#7a0d4e">Worker</text><rect x="528" y="156" width="94" height="46" rx="12" fill="#FBE9F4" stroke="#E61E96" stroke-width="1.3"/><text x="575" y="184" text-anchor="middle" font-size="12" font-weight="700" fill="#7a0d4e">Worker</text><line x1="455" y1="118" x2="380" y2="154" stroke="#8576A0" stroke-width="1.5" marker-end="url(#a2ar)"/><line x1="471" y1="118" x2="471" y2="154" stroke="#8576A0" stroke-width="1.5" marker-end="url(#a2ar)"/><line x1="487" y1="118" x2="562" y2="154" stroke="#8576A0" stroke-width="1.5" marker-end="url(#a2ar)"/><text x="471" y="236" text-anchor="middle" font-size="11" font-weight="700" fill="#b3203c">Coordination tax: ~15× tokens · more latency</text><text x="471" y="254" text-anchor="middle" font-size="11" font-weight="700" fill="#b3203c">cascading failure · larger security surface</text></svg>`,li:['<b>Single agent</b> — one loop, one context. Simplest, cheapest, most reliable for tasks one expert could do.','<b>Orchestrator-worker</b> — a lead decomposes, delegates to specialised workers, synthesises. The workhorse multi-agent shape.','<b>Supervisor / hierarchical</b> — layered orchestrators, supervisors of supervisors. For large decomposable problem spaces.','<b>Network / swarm</b> — agents talk peer-to-peer. Powerful, hardest to make reliable.']},
  {h:'The coordination tax',p:['Every extra agent is paid for:'],li:['<b>Cost</b> — multi-agent systems can burn on the order of 15× the tokens of a single chat, because each agent re-processes context and communication multiplies.','<b>Latency</b> — every handoff is another model call; planner→worker→critic→planner adds up.','<b>Cascading failure</b> — a wrong assumption upstream propagates to every downstream agent (OWASP ASI08).','<b>Security surface</b> — more identities, credentials, and inter-agent messages to secure (ASI07).']},
  {h:'When multi-agent earns its keep',p:['Start single-agent; move to multi only when single-agent testing shows limits you cannot fix with prompting, retrieval, or policy.'],callout:'Distinct roles (planner, reviewer, executor) do NOT by themselves justify multiple agents — a single agent with persona/context switching often suffices. A useful heuristic: <b>read/research tasks parallelise well across agents; write tasks create coordination conflicts and favour a single agent.</b>'}],
 challengeIntro:'Each design made a topology choice. Spot the one paying the coordination tax for no benefit — or the one that is right.',
 challenge:[
  {q:'A team splits a simple Slack-triage task — read message, fetch context, reply — across four coordinating agents.',o:['Correct design','Over-engineered — a single agent suffices; paying the tax for nothing','Needs even more agents','Needs a swarm'],c:1,e:'A single agent handles this; the coordination tax buys nothing.'},
  {q:'A research task fans out to read 30 independent sources in parallel, then a lead synthesises.',o:['Over-engineered','Sound — parallel reads suit multi-agent','Should be one agent','Should be a fixed chain'],c:1,e:'Independent reads parallelise well; this is a good use of multi-agent.'},
  {q:'A multi-step write task (interdependent code files) is split across parallel agents each editing different files independently.',o:['Ideal','Risky — interdependent writes create integration conflicts; favour a single agent or strict sequencing','Add more agents','No issue'],c:1,e:'Write tasks with dependencies create coordination conflicts.'},
  {q:'An upstream planner makes a wrong assumption; every downstream agent’s output turns out wrong.',o:['A model bug','Cascading failure — an upstream error propagated (ASI08)','A memory leak','Good behaviour'],c:1,e:'Upstream error propagation is a cascading failure.'}],
 quiz:[
  {q:'The simplest, cheapest, most reliable choice for a task one expert could do is…',o:['A swarm','A single agent','A supervisor hierarchy','Three orchestrators'],c:1,e:'Start with a single agent.'},
  {q:'A realistic order-of-magnitude cost penalty for multi-agent vs a single chat is…',o:['About the same','Roughly 15× the tokens','100× cheaper','No difference'],c:1,e:'Re-processed context and communication multiply cost.'},
  {q:'Distinct roles like planner/reviewer/executor…',o:['Always require separate agents','Do not by themselves justify multiple agents','Mean you need a swarm','Cannot exist in one agent'],c:1,e:'Persona/context switching in one agent often suffices.'},
  {q:'Which parallelises better across agents?',o:['Write tasks','Read/research tasks','Neither','Both equally'],c:1,e:'Reads parallelise; writes create conflicts.'},
  {q:'An upstream error propagating through downstream agents is called…',o:['A cascading failure','A rug-pull','A rogue agent','Goal drift'],c:0,e:'OWASP ASI08, Cascading Failures.'}]},
{id:'a3',ctype:'Find the integration flaw',title:'Tool & Integration Architecture',desc:'MCP, gateways, and least privilege — the integration layer is your biggest external risk.',
 brief:[
  {h:'Tools are the integration layer — and the biggest external risk',p:['An agent reaches the world through tools. How you expose, discover, and govern them is an architecture decision, not a wiring detail.']},
  {h:'MCP and the gateway pattern',p:['The Model Context Protocol (introduced by Anthropic in late 2024) has become the de facto standard for connecting agents to tools and data over a uniform interface. But tool selection is mediated by free-form natural-language descriptions interpreted at inference time — so any text the model reads can influence its behaviour. The architectural answer is a gateway/registry: route all tool access through a central proxy that enforces access control, scoped per-agent identity, policy checks, and audit logging; keep an internal catalogue recording owner, schema, scopes, and a cryptographic fingerprint pinned per tool.'],svg:`<svg viewBox="0 0 680 210" role="img" xmlns="http://www.w3.org/2000/svg"><title>The tool gateway pattern</title><desc>An agent routes every tool call through a central gateway that enforces policy, scoped identity, and audit logging before reaching the tools.</desc><defs><marker id="a3ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><rect x="20" y="78" width="120" height="56" rx="14" fill="#F4ECFB" stroke="#A100FF" stroke-width="1.5"/><circle cx="46" cy="100" r="4" fill="#A100FF"/><text x="80" y="112" text-anchor="middle" font-size="14" font-weight="700" fill="#460073">Agent</text><rect x="240" y="46" width="200" height="120" rx="16" fill="#E9EDFF" stroke="#3A53FF" stroke-width="1.8"/><text x="340" y="74" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1b2b8a">Gateway / registry</text><text x="340" y="100" text-anchor="middle" font-size="11.5" fill="#2c3ec9">Policy check</text><text x="340" y="120" text-anchor="middle" font-size="11.5" fill="#2c3ec9">Scoped per-agent identity</text><text x="340" y="140" text-anchor="middle" font-size="11.5" fill="#2c3ec9">Audit logging · fingerprint</text><rect x="540" y="36" width="120" height="36" rx="10" fill="#E1F5F2" stroke="#00B3A4" stroke-width="1.3"/><text x="600" y="59" text-anchor="middle" font-size="12" font-weight="700" fill="#056458">Tool A</text><rect x="540" y="86" width="120" height="36" rx="10" fill="#E1F5F2" stroke="#00B3A4" stroke-width="1.3"/><text x="600" y="109" text-anchor="middle" font-size="12" font-weight="700" fill="#056458">Tool B</text><rect x="540" y="136" width="120" height="36" rx="10" fill="#E1F5F2" stroke="#00B3A4" stroke-width="1.3"/><text x="600" y="159" text-anchor="middle" font-size="12" font-weight="700" fill="#056458">Tool C</text><line x1="140" y1="106" x2="238" y2="106" stroke="#8576A0" stroke-width="1.6" marker-end="url(#a3ar)"/><line x1="440" y1="92" x2="538" y2="56" stroke="#8576A0" stroke-width="1.5" marker-end="url(#a3ar)"/><line x1="440" y1="106" x2="538" y2="104" stroke="#8576A0" stroke-width="1.5" marker-end="url(#a3ar)"/><line x1="440" y1="120" x2="538" y2="152" stroke="#8576A0" stroke-width="1.5" marker-end="url(#a3ar)"/><text x="340" y="196" text-anchor="middle" font-size="11.5" fill="#8576A0" font-style="italic">No tool is wired directly to the agent — every call is mediated, scoped, and logged</text></svg>`,li:['<b>Tool-description poisoning</b> — malicious instructions hidden in a tool’s description.','<b>Rug-pull</b> — a server changes a tool’s definition after you approved it; re-verify the fingerprint each session.','<b>Supply chain (ASI04)</b> — third-party servers are executable dependencies; require an SBOM, signing, and vetting before production.']},
  {h:'Least privilege / minimal agency',p:[],callout:'Default answer to “should the agent have this tool?” is <b>no</b> until justified. Prefer read-only over write, scoped over broad, reversible over irreversible. Never wire a community/public tool straight into production.'}],
 challengeIntro:'Each integration decision has a flaw — or is correct. Identify it.',
 challenge:[
  {q:'An MCP server is pulled from a public registry and wired directly into the production agent because it “just works.”',o:['Fine — it works','Flaw — an unvetted third-party executable dependency in production (ASI04)','Flaw — too few tools','Correct least-privilege'],c:1,e:'Unvetted third-party servers are a supply-chain risk; require SBOM, signing, vetting.'},
  {q:'Every tool call routes through a central gateway that checks policy, scopes a per-agent identity, and logs the call.',o:['Over-engineered','Sound — the gateway/registry pattern','A pointless single point','Violates least privilege'],c:1,e:'Centralised enforcement and audit is exactly right.'},
  {q:'A tool’s definition is approved once at onboarding and never re-checked; the server can change it later.',o:['Fine','Flaw — rug-pull exposure; pin and re-verify the fingerprint each session','Needs more tools','Correct'],c:1,e:'Re-verification each session defends against rug-pulls.'},
  {q:'The task only ever reads one report, but the agent is given a broad data-warehouse read/write tool “for flexibility.”',o:['Good flexibility','Flaw — violates least privilege / minimal agency','Correct scoping','Only remove write'],c:1,e:'Scope to exactly what the task needs.'}],
 quiz:[
  {q:'MCP is best described as…',o:['A model architecture','An open protocol standardising how agents discover and invoke tools','A vector database','A cloud provider'],c:1,e:'A uniform tool/data interface for agents.'},
  {q:'The central risk of natural-language tool descriptions is that…',o:['They are too short','Any text the model reads can influence its behaviour (e.g., description poisoning)','They are slow','They cost tokens'],c:1,e:'Free-form descriptions are an injection surface.'},
  {q:'A “rug-pull” is defended against by…',o:['Using more tools','Re-verifying the tool’s fingerprint each session','A bigger model','Disabling logging'],c:1,e:'Pin and re-check fingerprints.'},
  {q:'The default answer to “should the agent have this tool?” should be…',o:['Yes, for flexibility','No, until the tool is justified','Always yes','It does not matter'],c:1,e:'Minimal agency by default.'},
  {q:'A third-party MCP server should be treated as…',o:['A trusted internal component','An executable dependency requiring SBOM, signing, and vetting','A static config file','A UI element'],c:1,e:'It runs with access to the agent context.'}]},
{id:'adata',ctype:'Find the grounding flaw',title:'Data & Context Architecture',desc:'Grounding, retrieval, and context engineering — the biggest lever on whether an agent is right or confidently wrong.',
 brief:[
  {h:'Context engineering has overtaken prompt engineering',p:['For agents, the dominant discipline is no longer crafting a clever prompt — it is curating <i>what the model sees</i> at each step. A large context window does not help if it is cluttered: context competes for the model’s finite attention, and a 200K-token window stuffed with noise can perform worse than a focused 20K.'],callout:'The 2026 instinct is <b>just-in-time retrieval over upfront stuffing</b>: start with the smallest useful context and give the agent tools to fetch what it needs, when it needs it — not “dump everything in just in case.”'},
  {h:'RAG and grounding — the lever on hallucination',p:['Retrieval-augmented generation grounds answers in real, current data instead of the model’s frozen training. Grounding is the single biggest lever on hallucination — but the pipeline has failure modes:'],svg:`<svg viewBox="0 0 680 210" role="img" xmlns="http://www.w3.org/2000/svg"><title>The grounding pipeline and its risk point</title><desc>Query to retrieval to assembled context to model to grounded answer, with a poisoned or stale chunk able to enter at the context step.</desc><defs><marker id="a4ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><rect x="16" y="74" width="104" height="52" rx="12" fill="#F4ECFB" stroke="#A100FF" stroke-width="1.4"/><text x="68" y="104" text-anchor="middle" font-size="13" font-weight="700" fill="#460073">Query</text><rect x="148" y="74" width="116" height="52" rx="12" fill="#FBE9F4" stroke="#E61E96" stroke-width="1.4"/><text x="206" y="97" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7a0d4e">Retrieve</text><text x="206" y="114" text-anchor="middle" font-size="10.5" fill="#b3206f">from knowledge base</text><rect x="292" y="74" width="116" height="52" rx="12" fill="#FFF3E0" stroke="#FF9A1F" stroke-width="1.5"/><text x="350" y="97" text-anchor="middle" font-size="12.5" font-weight="700" fill="#9a5b00">Assemble</text><text x="350" y="114" text-anchor="middle" font-size="10.5" fill="#b87214">context</text><rect x="436" y="74" width="104" height="52" rx="12" fill="#E9EDFF" stroke="#3A53FF" stroke-width="1.4"/><text x="488" y="104" text-anchor="middle" font-size="13" font-weight="700" fill="#1b2b8a">Model</text><rect x="566" y="74" width="100" height="52" rx="12" fill="#E1F5F2" stroke="#00B3A4" stroke-width="1.4"/><text x="616" y="97" text-anchor="middle" font-size="12.5" font-weight="700" fill="#056458">Grounded</text><text x="616" y="114" text-anchor="middle" font-size="10.5" fill="#067a6c">answer</text><line x1="120" y1="100" x2="146" y2="100" stroke="#8576A0" stroke-width="1.6" marker-end="url(#a4ar)"/><line x1="264" y1="100" x2="290" y2="100" stroke="#8576A0" stroke-width="1.6" marker-end="url(#a4ar)"/><line x1="408" y1="100" x2="434" y2="100" stroke="#8576A0" stroke-width="1.6" marker-end="url(#a4ar)"/><line x1="540" y1="100" x2="564" y2="100" stroke="#8576A0" stroke-width="1.6" marker-end="url(#a4ar)"/><line x1="350" y1="170" x2="350" y2="128" stroke="#E03251" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#a4ar)"/><text x="350" y="190" text-anchor="middle" font-size="11" font-weight="700" fill="#b3203c">Stale or poisoned chunk enters here — and corrupts every later step</text></svg>`,li:['<b>Stale context / drift</b> — outdated retrieved data makes the agent confidently wrong; live retrieval is the fix for time-sensitive facts.','<b>Context / retrieval poisoning</b> — a bad or adversarial chunk enters context early and corrupts every later step (the retrieval cousin of memory poisoning, OWASP ASI06).','<b>Data quality</b> — when retrieval and context are sound but the agent still errs, the cause is usually the underlying data. Garbage in, grounded garbage out.']},
  {h:'Grounding is also an auditability control',p:['Logging which documents and chunks were retrieved for each decision lets you replay and defend an answer — grounding is not only accuracy, it is part of the audit trail (the auditability NFR from the observability level).']}],
 challengeIntro:'Each data/context decision has a flaw — or is right. Identify it.',
 challenge:[
  {q:'“We have a 200K context window, so we concatenate the top 50 retrieved chunks plus the full knowledge base into every prompt.”',o:['Optimal — more context is always better','Flawed — cluttered context competes for attention; curate the smallest relevant slice','Flawed — the window is too small','Correct context engineering'],c:1,e:'More is not better; curate and retrieve just-in-time.'},
  {q:'“The agent answers price questions from a document indexed once a year.”',o:['Fine — it is grounded','Flawed — stale context causes drift; time-sensitive facts need live retrieval','Needs a bigger model','Correct'],c:1,e:'Grounding on stale data is confident-but-wrong.'},
  {q:'“An adversarial document is retrieved into context and its instruction is followed on every later step.”',o:['A model bug','Context/retrieval poisoning (ASI06)','A latency issue','Good grounding'],c:1,e:'Bad content entering context early and persisting is context poisoning.'},
  {q:'“Retrieval and context are well-engineered, yet the agent keeps citing wrong facts. Most likely root cause?”',o:['The model is too small','A data-quality problem in the underlying source','Too few agents','The prompt is too short'],c:1,e:'When the pipeline is sound, suspect the data layer.'}],
 quiz:[
  {q:'For agents in 2026, the dominant discipline is…',o:['Prompt engineering','Context engineering — curating what the model sees each step','Model fine-tuning','Bigger context windows'],c:1,e:'Curate context; the window is finite attention.'},
  {q:'The single biggest lever on hallucination is…',o:['A larger model','Grounding answers in real, current data (RAG)','More tools','Lower temperature'],c:1,e:'Grounding ties answers to real data.'},
  {q:'Stale retrieved data leads to…',o:['Faster answers','Context drift — confidently outdated answers','Lower cost','Better grounding'],c:1,e:'Refresh or retrieve live for time-sensitive facts.'},
  {q:'A bad chunk entering context early and corrupting later steps is…',o:['Context/retrieval poisoning','Prompt chaining','A cascading failure','Goal drift'],c:0,e:'The retrieval cousin of memory poisoning.'},
  {q:'Logging which chunks were retrieved per decision primarily supports…',o:['Faster inference','Auditability — replaying and defending an answer','Lower token cost','Bias removal'],c:1,e:'Grounding is part of the audit trail.'}]},
{id:'a4',ctype:'Name the threat',title:'Threat Modelling — OWASP Agentic Top 10',desc:'A shared vocabulary for the dominant agentic risks, each grounded in real incidents.',
 brief:[
  {h:'Threat-model at design time, not after build',p:['STRIDE is the baseline, extended for agent-specific surfaces: prompt-injection, tool-poisoning, memory-poisoning, delegation confusion, goal drift, cost exhaustion. The model is signed off before design proceeds.']},
  {h:'The OWASP Top 10 for Agentic Applications (2026)',p:['A peer-reviewed taxonomy of the dominant risks — not theoretical; each has real 2025 incidents:'],li:['<b>ASI01 Agent Goal Hijack</b> — attacker redirects the objective via hidden instructions in data (e.g., EchoLeak).','<b>ASI02 Tool Misuse & Exploitation</b> — legitimate tools bent to harm (e.g., Amazon Q).','<b>ASI03 Identity & Privilege Abuse</b> — credentials/permissions misused or escalated.','<b>ASI04 Agentic Supply Chain</b> — third-party tools/frameworks/MCP servers carry exposure (e.g., a GitHub MCP exploit).','<b>ASI05 Unexpected Code Execution (RCE)</b> — a sandbox boundary fails (e.g., a coding agent deleting a production DB; IDE CVEs).','<b>ASI06 Memory & Context Poisoning</b> — persistent memory shaped to mislead future steps.','<b>ASI07 Insecure Inter-Agent Communication</b> — spoofed, replayed, or unauthenticated messages.','<b>ASI08 Cascading Failures</b> — one agent’s error or compromise fans out across the system.','<b>ASI09 Human-Agent Trust Exploitation</b> — humans over-trust or are deceived into harmful action.','<b>ASI10 Rogue Agents</b> — agents acting outside intent, like an insider threat; caught by behavioural baselining.']}],
 challengeIntro:'For each scenario, name the OWASP agentic threat it represents.',
 challenge:[
  {q:'A hidden instruction inside an email the agent processes makes it silently exfiltrate data.',o:['ASI01 Agent Goal Hijack','ASI03 Identity & Privilege Abuse','ASI08 Cascading Failures','ASI10 Rogue Agents'],c:0,e:'Indirect instruction injection redirecting the objective is goal hijack.'},
  {q:'Unverified content written to long-term memory is retrieved days later and trusted as fact.',o:['ASI06 Memory & Context Poisoning','ASI02 Tool Misuse','ASI07 Insecure Inter-Agent Comms','ASI09 Trust Exploitation'],c:0,e:'Persisted, later-trusted content is memory poisoning.'},
  {q:'A third-party MCP server you wired in is compromised and alters tool behaviour.',o:['ASI04 Agentic Supply Chain','ASI01 Goal Hijack','ASI05 RCE','ASI03 Identity Abuse'],c:0,e:'A compromised third-party dependency is supply-chain risk.'},
  {q:'One sub-agent’s wrong assumption corrupts every downstream agent’s output.',o:['ASI08 Cascading Failures','ASI10 Rogue Agents','ASI06 Memory Poisoning','ASI07 Inter-Agent Comms'],c:0,e:'Propagating upstream error is a cascading failure.'},
  {q:'A coding agent escapes its sandbox and runs arbitrary commands, deleting a production database.',o:['ASI05 Unexpected Code Execution','ASI02 Tool Misuse','ASI04 Supply Chain','ASI01 Goal Hijack'],c:0,e:'Sandbox-boundary failure into arbitrary execution is RCE.'}],
 quiz:[
  {q:'The recommended baseline threat-modelling method, extended for agents, is…',o:['STRIDE','SWOT','RACI','TOGAF'],c:0,e:'STRIDE, extended with agent-specific surfaces.'},
  {q:'Threat modelling for agentic systems should happen…',o:['After go-live','At design time, before build','Only if an incident occurs','Never'],c:1,e:'Shift-left: model threats before design proceeds.'},
  {q:'ASI01, described as the “total loss of control,” is…',o:['Agent Goal Hijack','Rogue Agents','Tool Misuse','Cascading Failures'],c:0,e:'Goal hijack turns the asset into a weapon.'},
  {q:'Rogue agents (ASI10) are best detected by…',o:['Exact-match tests','Behavioural baselining / anomaly monitoring over time','A bigger model','Disabling tools'],c:1,e:'Their actions look legitimate in isolation; baseline behaviour over time.'},
  {q:'The OWASP Agentic Top 10 risks are…',o:['Purely theoretical','Grounded in real 2025 incidents','Only relevant to large enterprises','About hardware'],c:1,e:'EchoLeak, Amazon Q, Replit and others are real.'}]},
{id:'a5',ctype:'Fix the control gap',title:'Guardrails, Autonomy Tiers & Kill-Switches',desc:'Controls live outside the model. Classify autonomy, validate plans, and rehearse the kill-switch.',
 brief:[
  {h:'Controls live outside the model',p:['The model is part of the system, not the system. Guardrails — deterministic rule engines, policy validators, structured-output enforcement — must exist outside the model and not depend on its cooperation. “The model will handle it” is the defining anti-pattern.']},
  {h:'Autonomy tiers',p:['Classify every agent on a tier and govern accordingly:'],svg:`<svg viewBox="0 0 680 240" role="img" xmlns="http://www.w3.org/2000/svg"><title>Autonomy tiers T0 to T3</title><desc>Four ascending tiers from assistive to autonomous, with a kill-switch required above the lowest tier.</desc><rect x="20" y="170" width="150" height="50" rx="12" fill="#F4ECFB" stroke="#A100FF" stroke-width="1.5"/><text x="95" y="190" text-anchor="middle" font-size="13.5" font-weight="700" fill="#460073">T0 · Assistive</text><text x="95" y="208" text-anchor="middle" font-size="10.5" fill="#6A00B8">Proposes only</text><rect x="180" y="124" width="150" height="50" rx="12" fill="#FBE9F4" stroke="#E61E96" stroke-width="1.5"/><text x="255" y="144" text-anchor="middle" font-size="13.5" font-weight="700" fill="#7a0d4e">T1 · Supervised</text><text x="255" y="162" text-anchor="middle" font-size="10.5" fill="#b3206f">Reversible, watched</text><rect x="340" y="78" width="150" height="50" rx="12" fill="#E9EDFF" stroke="#3A53FF" stroke-width="1.5"/><text x="415" y="96" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1b2b8a">T2 · Constrained</text><text x="415" y="114" text-anchor="middle" font-size="10.5" fill="#2c3ec9">Acts within an envelope</text><rect x="500" y="32" width="160" height="50" rx="12" fill="#FBE7E9" stroke="#E03251" stroke-width="1.6"/><text x="580" y="50" text-anchor="middle" font-size="13.5" font-weight="700" fill="#a3203c">T3 · Autonomous</text><text x="580" y="68" text-anchor="middle" font-size="10.5" fill="#b3203c">Exceptional · senior sign-off</text><line x1="40" y1="170" x2="40" y2="55" stroke="#8576A0" stroke-width="1.4"/><path d="M40 55 l-4 7 h8 z" fill="#8576A0"/><text x="60" y="60" font-size="10.5" fill="#8576A0" transform="rotate(0)">more autonomy</text><line x1="180" y1="232" x2="660" y2="232" stroke="#E03251" stroke-width="1.2" stroke-dasharray="5 4"/><text x="420" y="226" text-anchor="middle" font-size="11" font-weight="700" fill="#b3203c">Tested, fail-safe kill-switch required above T0</text></svg>`,li:['<b>T0 Assistive</b> — proposes; a human does everything consequential.','<b>T1 Supervised</b> — executes reversible actions in a narrow scope, visible to a human who can override.','<b>T2 Constrained-autonomous</b> — acts within a rigorously specified envelope without per-action approval; escalates outside it.','<b>T3 Autonomous</b> — irreversible/high-consequence actions without per-action human involvement; an exceptional tier requiring explicit senior approval.']},
  {h:'Plan-then-validate & the kill-switch',p:['A strong runtime pattern: the agent proposes a complete plan, a policy engine validates the whole plan once, then lightweight step checks guard against drift during execution — preserving reasoning coherence while keeping the plan auditable.'],callout:'Every agent above the lowest tier needs a <b>tested kill-switch</b> with global, tenant, user, and tool granularity — rehearsed before go-live. It must <b>fail safe, not fail open</b>: if the policy engine is unreachable, escalate to a human; never proceed unchecked.'}],
 challengeIntro:'Each design has a control gap (or is correct). Identify the fix.',
 challenge:[
  {q:'Refund limits are enforced only by an instruction in the system prompt.',o:['Fine as-is','Move enforcement to a deterministic policy check outside the model','Make the prompt longer','Add examples'],c:1,e:'Guardrails must not depend on the model’s cooperation.'},
  {q:'If the policy engine is unreachable, the agent proceeds with the action anyway to avoid downtime.',o:['Correct — availability first','Wrong — it must fail safe (escalate), never fail open','Add a retry only','Acceptable for low value'],c:1,e:'Fail safe, not fail open.'},
  {q:'A T2 constrained-autonomous agent is deployed with no kill-switch because “it has been tested.”',o:['Fine — testing is enough','Gap — a tested kill-switch is required above the lowest tier','Needs more tests only','Lower the tier instead'],c:1,e:'The kill-switch is a precondition, not a contingency.'},
  {q:'The agent validates each step synchronously, interrupting its reasoning mid-plan and compounding latency.',o:['Optimal','Consider plan-then-validate — validate the whole plan once, then lightweight step checks','Remove validation','Add more agents'],c:1,e:'Plan-then-validate preserves coherence and cuts latency.'}],
 quiz:[
  {q:'Guardrails should be…',o:['Inside the model only','Enforced outside the model, not dependent on its cooperation','In the prompt only','Optional'],c:1,e:'External, deterministic enforcement.'},
  {q:'An agent taking irreversible high-consequence actions with no per-action human involvement is at tier…',o:['T0','T1','T3 (autonomous, exceptional)','T2'],c:2,e:'T3 is the exceptional, senior-approved tier.'},
  {q:'When the policy engine is unreachable, a safe system should…',o:['Proceed to avoid downtime','Escalate to a human (fail safe)','Retry silently forever','Disable logging'],c:1,e:'Never fail open.'},
  {q:'A kill-switch should be…',o:['Built after the first incident','Tested/rehearsed before go-live, with global/tenant/user/tool granularity','Global-only','Optional above T1'],c:1,e:'Rehearsed and granular.'},
  {q:'Plan-then-validate improves on per-step validation by…',o:['Removing validation','Validating the whole plan once to preserve coherence and cut latency, with light step checks','Adding agents','Using a bigger model'],c:1,e:'One plan-level pass plus drift checks.'}]},
{id:'arai',ctype:'Spot the RAI failure',title:'Responsible AI by Design',desc:'Fairness, transparency, accountability, and the regulatory frame — the discipline a secure design can still fail.',
 brief:[
  {h:'Secure is not the same as responsible',p:['Everything so far made the system <i>safe and well-engineered</i> — threat models, guardrails, kill-switches, observability. Responsible AI is a distinct discipline a perfectly secure agent can still fail. Its pillars:'],li:['<b>Fairness &amp; bias</b> — does the system disadvantage groups, or game a proxy metric at users’ expense?','<b>Transparency &amp; explainability</b> — can you explain, to an affected person, why the agent did what it did?','<b>Accountability</b> — a named human or body answers for the agent’s actions; “the model decided” is not an answer.','<b>Privacy by design</b> — data minimisation and purpose limitation built in, not bolted on.','<b>Harm prevention</b> — foreseeable harms identified and mitigated before deployment.']},
  {h:'Proxy-metric gaming is a fairness failure, not just a quality one',p:['Optimise an agent for an accessible proxy (satisfaction scores, fast resolution) and it will exploit the proxy — closing cases prematurely, over-promising, or preferring a confident wrong answer to honest uncertainty. Instrument the <b>outcome</b>, not only the proxy.']},
  {h:'The regulatory frame',p:['Three references recur — generic and public, worth knowing by name:'],li:['<b>EU AI Act</b> — a risk-tiered law (unacceptable / high / limited / minimal). High-risk systems carry obligations: risk management, data governance, logging, human oversight, transparency, and accuracy/robustness. Obligations are phasing in across 2025–2027 and the timeline is actively shifting — treat specific dates as live, not fixed.','<b>NIST AI RMF</b> — a voluntary US framework structured as <b>Govern, Map, Measure, Manage</b>, with a Generative AI Profile cataloguing GenAI-specific risks.','<b>ISO/IEC 42001</b> — the certifiable AI management-system standard; NIST AI RMF is often run as the operating model inside it.'],callout:'Responsible AI is <b>designed in</b>, like security — assessed before deployment, with a named owner. Retrofitting it after an incident is the expensive path.'}],
 challengeIntro:'Each “working” design hides a responsible-AI failure — or handles it well. Identify it.',
 challenge:[
  {q:'“The agent is tuned to maximise customer-satisfaction scores; resolution time dropped sharply.”',o:['Clear success','Proxy-metric gaming risk — it may close cases prematurely; instrument the real outcome','Irrelevant to responsible AI','A security issue only'],c:1,e:'Optimising a proxy invites gaming at users’ expense.'},
  {q:'“An applicant asks why the agent declined them. The team cannot reconstruct the reasoning.”',o:['Acceptable — models are black boxes','A transparency/explainability failure; decisions affecting people must be explainable','Fine if logged internally','A latency problem'],c:1,e:'High-impact decisions about people require explainability.'},
  {q:'“Asked who is accountable for the agent’s automated decisions, the answer is ‘the model decided’.”',o:['Reasonable','An accountability failure — a named human/body must own the outcome','Correct for autonomous systems','A cost issue'],c:1,e:'“The model decided” is not accountability.'},
  {q:'“The system collects every field it can ‘in case it is useful later’.”',o:['Good — data is valuable','Violates privacy by design — minimise data and limit purpose','Required for accuracy','Only a storage cost'],c:1,e:'Data minimisation and purpose limitation are built in.'},
  {q:'“For a hiring-screening agent, the team runs a documented risk assessment and assigns a named owner before launch.”',o:['Over-cautious','Sound — responsible AI designed in for a high-impact use case','Unnecessary paperwork','A pure security control'],c:1,e:'Designed-in RAI with an accountable owner is right for high-impact use.'}],
 quiz:[
  {q:'Responsible AI is best described as…',o:['The same as security','A distinct discipline: fairness, transparency, accountability, privacy, harm prevention','Only a legal concern','A type of guardrail'],c:1,e:'It is distinct from safety/security engineering.'},
  {q:'Optimising an agent for a proxy metric tends to…',o:['Always improve outcomes','Invite gaming of the proxy at users’ expense','Reduce cost only','Have no downside'],c:1,e:'Instrument the outcome, not just the proxy.'},
  {q:'The NIST AI RMF is structured around…',o:['Plan, Do, Check, Act','Govern, Map, Measure, Manage','Crawl, Walk, Run, Fly','Observe, Orient, Decide, Act'],c:1,e:'Four functions: Govern/Map/Measure/Manage.'},
  {q:'The EU AI Act is built on…',o:['A single rule for all AI','Risk tiers, with heavier obligations for high-risk systems','Voluntary guidance only','Hardware standards'],c:1,e:'Risk-tiered, with high-risk obligations.'},
  {q:'“The model decided” as an answer to accountability is…',o:['Sufficient','An accountability failure — a named human/body must own it','Correct for T3','Best practice'],c:1,e:'Accountability requires a named owner.'}]},
{id:'a6',ctype:'Set the gate',title:'Observability, Evals & Cost — NFRs as Gates',desc:'You cannot operate what you cannot see. Turn NFRs into concrete pass/fail gates.',
 brief:[
  {h:'You cannot operate what you cannot see',p:['Agentic observability extends the usual traces/logs/metrics — ideally on a standard schema such as OpenTelemetry — with agent-specific signals: the full plan and each tool call, policy decisions, model/provider and version (for drift), token/cost per task, and human override events.']},
  {h:'Evals are the test suite for non-determinism',p:['A regression eval harness runs in CI; previously-closed red-team findings must stay closed (100%). Watch leading indicators:'],li:['<b>Human override rate rising</b> → model drift or scope misfit.','<b>Guardrail trigger rate spiking</b> → attack, drift, or scope creep.','<b>Refusal-rate shifts</b> → prompt or model regression.','<b>Cost-per-task breaching budget</b> → unit economics failing.']},
  {h:'NFRs are pass/fail gates, not aspirations',p:[],callout:'A design <b>passes</b> only if it states concrete gates: a <b>latency budget</b> (including policy/validation overhead), a <b>cost ceiling</b> per task/session/tenant, <b>auditability</b> (every action replayable), and <b>failure containment</b> (a tested kill-switch that fails safe). “It works” is not “it is shippable.”'}],
 challengeIntro:'For each situation, pick the right operational gate or reading.',
 challenge:[
  {q:'Human override rate has climbed steadily over three weeks with no code change. Most likely meaning?',o:['Users are happier','A leading indicator of model drift or scope misfit','Irrelevant','The kill-switch is working'],c:1,e:'Rising overrides signal drift or scope misfit.'},
  {q:'A team wants to ship an agent that issues payments. What must be defined before go-live?',o:['Just a dashboard','A cost ceiling, latency budget, auditability, and a tested kill-switch','A bigger model','Nothing — monitor later'],c:1,e:'Concrete NFR gates plus containment.'},
  {q:'How should a non-deterministic agent be regression-tested in CI?',o:['Exact-match unit tests','An eval harness over a representative case set, with closed red-team findings kept at 100%','Manual demo only','No testing needed'],c:1,e:'Evals are the regression suite for non-determinism.'},
  {q:'Cost per task has quietly risen above the approved budget.',o:['Ignore — quality matters more','Treat as an NFR breach: gate and alert on cost','Increase the budget silently','Add agents'],c:1,e:'Unit economics failing is a breach to gate on.'}],
 quiz:[
  {q:'A standard schema for agentic telemetry (traces/metrics/logs) is provided by…',o:['OpenTelemetry','HTML','CSV','SMTP'],c:0,e:'OTel is the vendor-neutral standard.'},
  {q:'A rising human override rate is a leading indicator of…',o:['Higher satisfaction','Model drift or scope misfit','Lower cost','Nothing'],c:1,e:'It flags drift or misfit early.'},
  {q:'Evals function as…',o:['A UI feature','The regression test suite for a non-deterministic system','A billing tool','A deployment script'],c:1,e:'They test behaviour over a case set.'},
  {q:'Previously-closed red-team findings should pass at…',o:['50%','80%','100%','Any level'],c:2,e:'Closed findings must stay closed.'},
  {q:'NFRs in an agentic design should be treated as…',o:['Aspirations','Concrete pass/fail gates','Documentation only','Post-launch concerns'],c:1,e:'Gates, not hopes.'}]},
{id:'a7',ctype:'Capstone review',title:'Architect Capstone — Full Design Review',desc:'The integrative test. Ten decisions across pattern, topology, tools, data, threats, guardrails, responsible AI, and NFRs. You need 7 of 10.',cpass:7,
