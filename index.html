<style>
:root{
  --violet:#A100FF;--violet-deep:#460073;--violet-700:#6A00B8;
  --magenta:#E61E96;--blue:#3A53FF;--teal:#00B3A4;--amber:#FF9A1F;
  --bg:#F4F1FA;--bg-2:#ECE6F7;--paper:#FFFFFF;
  --ink:#1C0D33;--ink-soft:#4A3866;--muted:#8576A0;
  --line:rgba(70,0,115,.12);--line-strong:rgba(70,0,115,.22);
  --ok:#0E9E6E;--bad:#E03251;
  --shadow-sm:0 2px 8px rgba(70,0,115,.07);
  --shadow:0 14px 40px -16px rgba(70,0,115,.28);
  --spectrum:linear-gradient(120deg,var(--violet) 0%,var(--magenta) 48%,var(--blue) 100%);
  --spectrum-arch:linear-gradient(120deg,var(--blue) 0%,var(--violet) 55%,var(--teal) 100%);
}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{font-family:'Hanken Grotesk',system-ui,sans-serif;color:var(--ink);
  background:radial-gradient(900px 500px at 88% -8%,rgba(230,30,150,.10),transparent 60%),
    radial-gradient(820px 520px at -6% 6%,rgba(161,0,255,.13),transparent 60%),
    radial-gradient(700px 600px at 50% 120%,rgba(58,83,255,.08),transparent 60%),var(--bg);
  background-attachment:fixed;-webkit-font-smoothing:antialiased;min-height:100vh}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(rgba(70,0,115,.05) 1px,transparent 1px);background-size:22px 22px;
  mask-image:linear-gradient(180deg,transparent,#000 8%,#000 92%,transparent)}
.wrap{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:0 22px 90px}
.topbar{position:sticky;top:0;z-index:30;backdrop-filter:saturate(140%) blur(10px);background:rgba(244,241,250,.78);border-bottom:1px solid var(--line)}
.topbar-inner{max-width:1080px;margin:0 auto;padding:12px 22px;display:flex;align-items:center;gap:16px}
.brand{display:flex;align-items:center;gap:10px;cursor:pointer;font-family:'Bricolage Grotesque';font-weight:800;letter-spacing:-.02em;font-size:18px;color:var(--ink)}
.brand .mark{width:30px;height:30px;border-radius:9px;background:var(--spectrum);display:grid;place-items:center;color:#fff;font-family:'JetBrains Mono';font-weight:700;font-size:18px;box-shadow:0 6px 16px -6px rgba(161,0,255,.7)}
.brand .mark svg{width:20px;height:20px}
.brand small{display:block;font-family:'JetBrains Mono';font-weight:500;font-size:9.5px;letter-spacing:.18em;color:var(--violet-700);text-transform:uppercase;margin-top:1px}
.topbar-spacer{flex:1}
.xp-chip{display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono';font-weight:700;font-size:12.5px;color:var(--violet-deep);background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:6px 12px;box-shadow:var(--shadow-sm)}
.xp-chip b{color:var(--violet)}
.btn-ghost{font-family:'JetBrains Mono';font-weight:500;font-size:11px;letter-spacing:.04em;color:var(--muted);background:none;border:1px solid var(--line);border-radius:999px;padding:6px 11px;cursor:pointer;transition:.18s}
.btn-ghost:hover{color:var(--bad);border-color:var(--bad)}
.progress-rail{height:3px;background:var(--bg-2)}
.progress-fill{height:100%;width:0;background:var(--spectrum);transition:width .6s cubic-bezier(.2,.8,.2,1)}
.hero{position:relative;padding:64px 0 30px;animation:rise .7s cubic-bezier(.2,.8,.2,1) both}
.eyebrow{font-family:'JetBrains Mono';font-weight:700;font-size:11.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--violet-700);display:inline-flex;align-items:center;gap:9px}
.eyebrow::before{content:"";width:26px;height:2px;background:var(--spectrum);border-radius:2px}
.h1{font-family:'Bricolage Grotesque';font-weight:800;letter-spacing:-.035em;line-height:.98;font-size:clamp(40px,7vw,76px);margin:16px 0 0;color:var(--ink)}
.h1 .grad{background:var(--spectrum);-webkit-background-clip:text;background-clip:text;color:transparent}
.lede{font-size:clamp(16px,2vw,19px);line-height:1.6;color:var(--ink-soft);max-width:620px;margin:20px 0 0}
.cta-row{display:flex;flex-wrap:wrap;gap:14px;margin-top:32px}
.btn{font-family:'Hanken Grotesk';font-weight:700;font-size:15.5px;border:none;border-radius:14px;padding:15px 24px;cursor:pointer;display:inline-flex;align-items:center;gap:10px;transition:.2s;letter-spacing:-.01em}
.btn .chev{font-family:'JetBrains Mono';font-weight:700;transition:.2s}
.btn:hover .chev{transform:translateX(4px)}
.btn-primary{background:var(--spectrum);color:#fff;box-shadow:0 16px 36px -14px rgba(161,0,255,.75)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 22px 46px -14px rgba(161,0,255,.85)}
.btn-secondary{background:var(--paper);color:var(--violet-deep);border:1.5px solid var(--line-strong);box-shadow:var(--shadow-sm)}
.btn-secondary:hover{transform:translateY(-2px);border-color:var(--violet);box-shadow:var(--shadow)}
.hero-deco{position:absolute;right:0;top:24px;display:none;width:250px;opacity:.42;pointer-events:none;z-index:0}
@media(min-width:880px){.hero-deco{display:block}}
.hero-deco svg{width:100%;height:auto}
.tracks{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:46px}
@media(max-width:720px){.tracks{grid-template-columns:1fr}}
.track-card{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.track-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--spectrum)}
.track-card.arch::before{background:var(--spectrum-arch)}
.track-tag{font-family:'JetBrains Mono';font-weight:700;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--violet-700)}
.track-card.arch .track-tag{color:var(--blue)}
.track-card h3{font-family:'Bricolage Grotesque';font-weight:700;font-size:21px;margin:8px 0 6px;letter-spacing:-.02em}
.track-card p{margin:0;color:var(--ink-soft);font-size:14.5px;line-height:1.55}
.section-head{padding:40px 0 8px;animation:rise .6s both}
.section-head .eyebrow{margin-bottom:10px}
.section-head h2{font-family:'Bricolage Grotesque';font-weight:800;font-size:clamp(28px,4vw,40px);letter-spacing:-.03em;margin:0;color:var(--ink)}
.section-head .sub{color:var(--ink-soft);font-size:15px;margin-top:8px;max-width:660px;line-height:1.55}
.track-banner{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:26px 0 14px}
.track-chip{font-family:'JetBrains Mono';font-weight:700;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;padding:7px 13px;border-radius:999px;background:rgba(161,0,255,.10);color:var(--violet-deep)}
.track-chip.arch{background:rgba(58,83,255,.12);color:#2436c9}
.lock-note{font-family:'JetBrains Mono';font-weight:500;font-size:11px;color:var(--muted);background:var(--bg-2);border-radius:999px;padding:7px 13px}
.lock-note.open{background:rgba(0,179,164,.14);color:#067468;font-weight:700}
.map{display:flex;flex-direction:column;gap:0;margin-top:6px}
.lvl{position:relative;display:flex;gap:18px;align-items:stretch;padding-bottom:18px}
.lvl .spine{display:flex;flex-direction:column;align-items:center;width:46px;flex:0 0 46px}
.node{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;font-family:'Bricolage Grotesque';font-weight:800;font-size:16px;border:2px solid var(--line-strong);background:var(--paper);color:var(--muted);transition:.25s;z-index:2}
.connector{width:3px;flex:1;background:var(--line);margin:4px 0;border-radius:2px}
.lvl:last-child .connector{display:none}
.lvl.unlocked .node{border-color:var(--violet);color:var(--violet);box-shadow:0 0 0 5px rgba(161,0,255,.10)}
.lvl.active .node{background:var(--spectrum);color:#fff;border-color:transparent;box-shadow:0 10px 26px -8px rgba(161,0,255,.7);animation:pulse 2.4s ease-in-out infinite}
.lvl.arch.active .node{background:var(--spectrum-arch)}
.lvl.arch.unlocked .node{border-color:var(--blue);color:var(--blue);box-shadow:0 0 0 5px rgba(58,83,255,.10)}
.lvl.done .node{background:var(--teal);border-color:transparent;color:#fff}
.lvl-card{flex:1;background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:18px 20px;box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:16px;transition:.22s;cursor:pointer}
.lvl.locked .lvl-card{cursor:not-allowed;opacity:.6;background:linear-gradient(180deg,var(--paper),var(--bg-2))}
.lvl:not(.locked) .lvl-card:hover{transform:translateX(4px);box-shadow:var(--shadow);border-color:var(--line-strong)}
.lvl-card .meta{flex:1}
.lvl-card .ctype{font-family:'JetBrains Mono';font-weight:700;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--violet-700)}
.lvl.arch .lvl-card .ctype{color:#2436c9}
.lvl-card h4{font-family:'Bricolage Grotesque';font-weight:700;font-size:17.5px;margin:3px 0 4px;letter-spacing:-.02em;color:var(--ink)}
.lvl-card .desc{font-size:13.5px;color:var(--ink-soft);line-height:1.45}
.lvl-card .status{font-family:'JetBrains Mono';font-weight:700;font-size:10.5px;letter-spacing:.06em;padding:5px 10px;border-radius:999px;white-space:nowrap}
.st-locked{background:var(--bg-2);color:var(--muted)}
.st-open{background:rgba(161,0,255,.10);color:var(--violet-deep)}
.st-done{background:rgba(0,179,164,.14);color:#067468}
.backlink{display:inline-flex;align-items:center;gap:7px;font-family:'JetBrains Mono';font-weight:500;font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;padding:0;margin:30px 0 6px}
.backlink:hover{color:var(--violet)}
.stepper{display:flex;gap:8px;margin:14px 0 22px;flex-wrap:wrap}
.step{font-family:'JetBrains Mono';font-weight:700;font-size:11px;letter-spacing:.04em;padding:7px 13px;border-radius:999px;border:1px solid var(--line);color:var(--muted);background:var(--paper)}
.step.on{background:var(--spectrum);color:#fff;border-color:transparent}
.step.passed{background:rgba(0,179,164,.14);color:#067468;border-color:transparent}
.panel{background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:clamp(22px,4vw,38px);box-shadow:var(--shadow);animation:rise .45s both}
.panel .ctype{font-family:'JetBrains Mono';font-weight:700;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--violet-700)}
.panel h2{font-family:'Bricolage Grotesque';font-weight:800;font-size:clamp(26px,4vw,36px);letter-spacing:-.03em;margin:8px 0 0;color:var(--ink)}
.brief{margin-top:22px}.brief .block{margin-bottom:22px}.brief .block:last-child{margin-bottom:0}
.brief h3{font-family:'Bricolage Grotesque';font-weight:700;font-size:18.5px;letter-spacing:-.01em;margin:0 0 8px;color:var(--violet-deep);display:flex;gap:9px;align-items:baseline}
.brief h3 .num{font-family:'JetBrains Mono';font-size:13px;color:var(--violet)}
.brief p{margin:0 0 9px;font-size:15.5px;line-height:1.62;color:var(--ink-soft)}
.brief ul{margin:6px 0 0;padding-left:0;list-style:none}
.brief li{position:relative;padding-left:24px;margin-bottom:9px;font-size:15px;line-height:1.55;color:var(--ink-soft)}
.brief li::before{content:">";position:absolute;left:2px;top:0;font-family:'JetBrains Mono';font-weight:700;color:var(--magenta)}
.brief b{color:var(--ink)}
.callout{border-left:4px solid var(--violet);background:linear-gradient(90deg,rgba(161,0,255,.07),transparent);border-radius:0 12px 12px 0;padding:14px 18px;margin:6px 0 0;font-size:14.5px;line-height:1.55;color:var(--ink-soft)}
.callout b{color:var(--violet-deep)}
.brief-svg{margin:14px 0 2px;padding:16px;background:linear-gradient(180deg,var(--paper),var(--bg));border:1px solid var(--line);border-radius:14px}
.brief-svg svg{display:block;width:100%;height:auto;font-family:'Hanken Grotesk',sans-serif}
.prompt-intro{font-size:15.5px;line-height:1.6;color:var(--ink-soft);margin:18px 0 6px}
.q{border:1px solid var(--line);border-radius:16px;padding:18px;margin-top:16px;background:linear-gradient(180deg,var(--paper),var(--bg))}
.q .qtxt{font-weight:600;font-size:15.5px;line-height:1.5;color:var(--ink);margin-bottom:13px}
.q .qtxt .qn{font-family:'JetBrains Mono';font-weight:700;font-size:12px;color:var(--violet);margin-right:8px}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{display:flex;align-items:flex-start;gap:11px;border:1.5px solid var(--line);border-radius:11px;padding:12px 14px;cursor:pointer;font-size:14.5px;line-height:1.45;color:var(--ink-soft);background:var(--paper);transition:.16s}
.opt:hover{border-color:var(--violet);background:rgba(161,0,255,.04)}
.opt .dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--line-strong);flex:0 0 18px;margin-top:1px;transition:.16s}
.opt.sel{border-color:var(--violet);background:rgba(161,0,255,.08);color:var(--ink)}
.opt.sel .dot{border-color:var(--violet);background:var(--violet);box-shadow:inset 0 0 0 3px var(--paper)}
.opt.correct{border-color:var(--ok);background:rgba(14,158,110,.10)}
.opt.correct .dot{border-color:var(--ok);background:var(--ok);box-shadow:inset 0 0 0 3px var(--paper)}
.opt.wrong{border-color:var(--bad);background:rgba(224,50,81,.09)}
.opt.wrong .dot{border-color:var(--bad);background:var(--bad);box-shadow:inset 0 0 0 3px var(--paper)}
.opt.locked{cursor:default;pointer-events:none}
.explain{margin-top:11px;font-size:13.5px;line-height:1.5;padding:11px 13px;border-radius:10px;background:var(--bg-2);color:var(--ink-soft);display:none}
.explain.show{display:block;animation:rise .3s both}
.explain b{color:var(--violet-deep)}
.explain .verdict{font-family:'JetBrains Mono';font-weight:700;font-size:11px;letter-spacing:.06em;margin-right:8px}
.explain .v-ok{color:var(--ok)}.explain .v-bad{color:var(--bad)}
.actionbar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-top:24px}
.scorepill{font-family:'JetBrains Mono';font-weight:700;font-size:12.5px;padding:8px 14px;border-radius:999px;background:var(--bg-2);color:var(--ink-soft)}
.scorepill.pass{background:rgba(14,158,110,.14);color:#067458}
.scorepill.fail{background:rgba(224,50,81,.12);color:#b3203c}
.hint{font-size:13px;color:var(--muted);font-style:italic}
.result{text-align:center;padding:18px 0 4px}
.result .badge{width:84px;height:84px;border-radius:24px;margin:0 auto 16px;display:grid;place-items:center;font-size:40px;background:var(--spectrum);color:#fff;box-shadow:0 18px 40px -14px rgba(161,0,255,.7);animation:pop .5s cubic-bezier(.2,1.4,.4,1) both}
.result.win .badge{background:linear-gradient(135deg,var(--teal),var(--blue))}
.result h2{font-family:'Bricolage Grotesque';font-weight:800;font-size:30px;letter-spacing:-.02em;margin:0}
.result p{color:var(--ink-soft);font-size:15.5px;max-width:540px;margin:10px auto 0;line-height:1.55}
.xp-gain{font-family:'JetBrains Mono';font-weight:700;color:var(--violet);font-size:14px;margin-top:8px}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes pop{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{box-shadow:0 10px 26px -8px rgba(161,0,255,.7)}50%{box-shadow:0 10px 26px -8px rgba(161,0,255,.7),0 0 0 8px rgba(161,0,255,.12)}}
.foot{text-align:center;margin-top:48px;font-family:'JetBrains Mono';font-size:11px;letter-spacing:.04em;color:var(--muted)}
.foot b{color:var(--violet-700)}
.copyright{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:22px;text-align:center;
  font-family:'JetBrains Mono';font-weight:500;font-size:11px;letter-spacing:.06em;color:var(--muted);
  border-top:1px solid var(--line)}
.copyright b{color:var(--violet-700);font-weight:700}
</style>
</head>
